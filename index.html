  /* ===== 语音气泡 · 波形条样式 ===== */
.voice-bubble {
  cursor: pointer;
  user-select: none;
  min-width: 120px;
}

.voice-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.play-icon {
  font-size: 14px;
  opacity: 0.6;
  flex-shrink: 0;
}

/* 波形条容器 */
.wave-bars {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 22px;
  flex: 1;
}

/* 每个条：默认静止（不波动），高度固定 */
.wave-bars .bar {
  width: 3px;
  border-radius: 2px;
  background: currentColor;
  opacity: 0.4;
  height: 12px;
  transition: opacity 0.3s;
}
.wave-bars .bar:nth-child(1) { height: 10px; }
.wave-bars .bar:nth-child(2) { height: 16px; }
.wave-bars .bar:nth-child(3) { height: 20px; }
.wave-bars .bar:nth-child(4) { height: 14px; }
.wave-bars .bar:nth-child(5) { height: 8px; }
.wave-bars .bar:nth-child(6) { height: 18px; }
.wave-bars .bar:nth-child(7) { height: 22px; }
.wave-bars .bar:nth-child(8) { height: 11px; }

/* 展开后：波形开始波动 */
.voice-bubble.expanded .wave-bars .bar {
  animation: waveAnim 1.2s ease-in-out infinite;
  opacity: 0.7;
}
.voice-bubble.expanded .wave-bars .bar:nth-child(1) { animation-delay: 0s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(2) { animation-delay: 0.15s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(3) { animation-delay: 0.3s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(4) { animation-delay: 0.45s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(5) { animation-delay: 0.6s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(6) { animation-delay: 0.75s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(7) { animation-delay: 0.9s; }
.voice-bubble.expanded .wave-bars .bar:nth-child(8) { animation-delay: 1.05s; }

@keyframes waveAnim {
  0%, 100% { transform: scaleY(0.4); opacity: 0.3; }
  50% { transform: scaleY(1); opacity: 0.9; }
}

/* 时长 */
.duration {
  font-size: 12px;
  opacity: 0.5;
  font-variant-numeric: tabular-nums;

}
/* 展开后显示文字 */
.voice-bubble.expanded .voice-text {

}

/* ============================================================
   天气小组件：微光粒子动画
   ============================================================ */
@keyframes floatParticle {
  0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
  50% { transform: translate(16px, -24px) scale(2.2); opacity: 0.7; }
  100% { transform: translate(-8px, 8px) scale(1); opacity: 0.3; }
}

/* 星夜十字 · 星星闪烁动画 */
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.95); }
  50% { opacity: 0.9; transform: scale(1.1); }
  100% { opacity: 0.2; transform: scale(0.95); }
}
/* ============================================================
   时钟小组件 · 背景透明版
   ============================================================ */

/* ----- 基础条形时钟（单行） ----- */
.clock-starry {
    background: transparent;                /* 完全透明 */
    border: none;                           /* 去掉边框 */
    box-shadow: none;                       /* 去掉阴影 */
    backdrop-filter: none;                  /* 去掉模糊 */
    -webkit-backdrop-filter: none;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: none;                       /* 去掉过渡动画（可选） */
    min-height: 52px;
    position: relative;
    overflow: visible;                      /* 允许内容溢出显示 */
}

/* 去掉伪元素光晕 */
.clock-starry::before,
.clock-starry::after {
    display: none;
}

/* 内部元素保持 z-index 不变，但不再需要 */
.clock-starry > * {
    position: relative;
    z-index: 1;
}

/* —— 左侧：时间 + 日期 —— */
.clock-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
}

.clock-starry .time {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 1px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: baseline;
    gap: 4px;
}

.clock-starry .time .star {
    color: var(--theme);
    font-size: 12px;
    opacity: 0.35;
    margin: 0 2px;
    animation: twinkle 3s ease-in-out infinite 0.3s;
}

.clock-starry .date {
    font-size: 12px;
    color: var(--sub);
    opacity: var(--clock-sub-opacity, 0.7);  /* 这里改了 */
    white-space: nowrap;
}
.clock-starry .greet {
    font-size: 12px;
    color: var(--theme);
    opacity: var(--clock-theme-opacity, 0.45); /* 这里改了 */
    letter-spacing: 2px;
    white-space: nowrap;
    font-weight: 300;
}
/* ----- 2×2 大组件（毛玻璃 → 透明）----- */
.clock-starry.widget-2x2 {
    grid-column: span 2;
    grid-row: span 2;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 6px;
    padding: 20px;

// ===== 轻量收集：只捞今天、且与该角色直接相关的群聊/朋友圈片段 =====
function collectExtraContextForChar(c) {
  var todayStr = new Date().toISOString().slice(0, 10);
  var isToday = function(t){ return new Date(t||0).toISOString().slice(0,10) === todayStr; };
  var nameOf = function(id){
    if (id === 'me') return (DB.me && DB.me.name) || '我';
    if (id === c.id) return c.name || c.nick;
    return '群友';
  };
  var mentioned = function(txt){
    if (!txt) return false;
    return (c.name && txt.indexOf(c.name) >= 0) || (c.nick && txt.indexOf(c.nick) >= 0);
  };
  var lines = [];

  // 1) 群聊：只看该角色所在的群
  (DB.groups || []).forEach(function(g){
    if (!g.members || g.members.indexOf(c.id) < 0) return;
    var msgs = (DB.chats[g.id] || []).filter(function(m){ return isToday(m.time); });
    msgs.slice(-60).forEach(function(m){
      var txt = lastText(m) || '';
      if (!txt) return;
      if (m.role === 'assistant' && m.charId === c.id) {
        lines.push('[群聊·'+(g.name||'群')+'] '+ (c.name||c.nick) +'：'+ txt);   // TA自己说的
      } else if (m.role === 'user' && mentioned(txt)) {
        lines.push('[群聊·'+(g.name||'群')+'] '+ nameOf('me') +'：'+ txt);        // 我在群里提到TA
      }
    });
  });

  // 2) 朋友圈：TA发的 / TA点赞的 / TA评论的 / 内容提到TA的
  (DB.moments || []).filter(function(p){ return isToday(p.time); }).slice(-40).forEach(function(p){
    var isAuthor       = p.author === c.id;
    var likedByChar    = (p.likes || []).indexOf(c.id) >= 0;
    var commentedByChar= (p.comments || []).some(function(cm){ return cm.by === c.id; });
    var textMentions   = mentioned(p.text);
    if (!(isAuthor || likedByChar || commentedByChar || textMentions)) return;

    if (isAuthor) {
      lines.push('[朋友圈] '+(c.name||c.nick)+' 发布："'+ (p.text||'') +'"');
    } else if (p.text) {
      lines.push('[朋友圈] '+ nameOf(p.author) +' 发布："'+ p.text +'"');
    }
    if (likedByChar && !isAuthor) {
      lines.push('  └ '+(c.name||c.nick)+' 点了赞');
    }
    (p.comments || []).forEach(function(cm){
      if (cm.by === c.id) lines.push('  └ '+(c.name||c.nick)+' 评论："'+ (cm.text||'') +'"');
    });
  });

  // 3) 防爆闸：最多20条、总字数≤1200
  var picked = lines.slice(-20).join('\n');
  if (picked.length > 1200) picked = picked.slice(-1200);
  return picked; // 空字符串 = 今天群聊/朋友圈跟TA没关系
}

    var items = Array.isArray(data.memories) ? data.memories : [];

    if (data.relation && typeof data.relation === 'string' && data.relation.trim()) {
      if (!c.status) c.status = {};
      c.status.当前关系 = data.relation.trim();
    }

    var anyAdded = false;
    items.forEach(function(item) {
      if (!item.content || !item.priority) return;
      var exists = (c.memories || []).some(function(m) {
        return m.content === item.content;
      });
      if (exists) return;
      if (!c.memories) c.memories = [];
      c.memories.push({
        id: 'mem_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        time: Date.now(),
        content: item.content,
        type: 'auto',
        priority: item.priority,
        edited: false
      });
      if (!c.chapters) c.chapters = [];
      c.chapters.push({ date: todayStr, content: '[记忆] ' + item.content });
      anyAdded = true;
    });

    if (anyAdded || (data.relation && data.relation.trim())) save();
    return anyAdded || !!(data.relation && data.relation.trim());
  } catch (e) {
    console.error('生成记忆失败（' + (c.nick || c.name) + '）：', e);
    return false;
  }
}
async function autoGenerateDailyMemories() {
  // 检查今天是否已经生成过
  var today = new Date().toISOString().slice(0, 10);
  if (DB.settings.lastDailyMemoryDate === today) return;

  // 获取所有非草稿角色
  var chars = DB.contacts.filter(function(c) { return !c._draft; });
  if (!chars.length) return;

  console.log('📒 开始每日自动生成记忆...');
  var anyGenerated = false;

  for (var i = 0; i < chars.length; i++) {
    var c = chars[i];
    var success = await generateMemoryForChar(c);
    if (success) anyGenerated = true;
    // 每个角色之间间隔1秒，避免API限流
    await sleep(1000);
  }

  // 记录今天已生成
  DB.settings.lastDailyMemoryDate = today;
  save();

  if (anyGenerated) {
    console.log('✅ 每日记忆生成完成');
    // 如果当前在备忘录或角色编辑页，刷新界面
    if (view.type === 'memo' || view.type === 'memoDetail' || view.type === 'charEdit') {

}

  if (val <= 80) return { emoji: '🔥', label: '主动粘人' };

// ===== 粘人度跟随好感度（单向联动） =====
function syncClinginess(c) {
  if (!c) return;
  var target = c.status.好感度 || 50;
  var current = c.clinginess || 50;
  var diff = target - current;
  if (Math.abs(diff) < 1) return;
  // 移动幅度 15%~25%，带一点随机让变化更自然
  var factor = 0.15 + Math.random() * 0.1;
  var move = Math.round(diff * factor);
  if (Math.abs(move) < 1) {
    move = diff > 0 ? 1 : -1;
  }
  c.clinginess = clamp(current + move);
}

  // ★ 修改点 2：日期加上年份

  // 状态栏时间
  document.getElementById('sbTime').textContent = hh + ':' + mm;

  // 世界名
  if (nameEl) nameEl.textContent = (w.id === '_placeholder') ? '未关联' : (w.name || '未命名');
  
  // 更新时间
  if (timeEl && w.weather.updatedAt) {

    var hours = Math.floor(diff / (60 * 60 * 1000));
    var mins = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));

    else if (mins > 0) timeText = mins + '分钟前';

// 天气小组件：滑动绑定
// ============================================================
function bindWeatherWidgetEvents() {
  var widget = document.getElementById('weatherWidget');
  if (!widget) return;
  if (widget._bound) return;
  widget._bound = true;
  
  // ---- 触摸滑动 ----
  widget.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    _weatherSwipeStartX = t.clientX;
    _weatherSwipeStartY = t.clientY;
    this._swipeMoved = false;
    this.style.transition = 'none';
  }, {passive: true});
  
  widget.addEventListener('touchmove', function(e) {
    if (_weatherSwipeStartX === undefined) return;
    var t = e.touches[0];
    var dx = t.clientX - _weatherSwipeStartX;
    var dy = t.clientY - _weatherSwipeStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 15) return;
    if (Math.abs(dx) < 10) return;
    e.preventDefault();
    this._swipeMoved = true;
    var progress = Math.max(-1, Math.min(1, dx / 80));
    var card = this.querySelector('#weatherCardContent');
    if (card) card.style.transform = 'translateX(' + (progress * 40) + 'px)';
  }, {passive: false});
  
  widget.addEventListener('touchend', function(e) {
    var card = this.querySelector('#weatherCardContent');
    if (card) {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0)';
    }
    if (this._swipeMoved && _weatherSwipeStartX !== undefined) {
      var dx = e.changedTouches[0].clientX - _weatherSwipeStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) {
          _weatherCurrentIndex = Math.min(_weatherCurrentIndex + 1, _weatherWorlds.length - 1);
        } else {
          _weatherCurrentIndex = Math.max(_weatherCurrentIndex - 1, 0);
        }
        renderWeatherWidget();
      }
    }
    _weatherSwipeStartX = undefined;
    this._swipeMoved = false;
  }, {passive: true});
  
  // ---- 鼠标拖拽（PC） ----
  var pointerStartX = 0, pointerMoved = false;
  widget.addEventListener('pointerdown', function(e) {
    pointerStartX = e.clientX;
    pointerMoved = false;
    this.style.transition = 'none';
  });
  widget.addEventListener('pointermove', function(e) {
    if (pointerStartX === undefined) return;
    var dx = e.clientX - pointerStartX;
    if (Math.abs(dx) < 10) return;
    pointerMoved = true;
    var progress = Math.max(-1, Math.min(1, dx / 80));
    var card = this.querySelector('#weatherCardContent');
    if (card) card.style.transform = 'translateX(' + (progress * 40) + 'px)';
  });
  widget.addEventListener('pointerup', function(e) {
    var card = this.querySelector('#weatherCardContent');
    if (card) {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0)';
    }
    if (pointerMoved && pointerStartX !== undefined) {
      var dx = e.clientX - pointerStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) {
          _weatherCurrentIndex = Math.min(_weatherCurrentIndex + 1, _weatherWorlds.length - 1);
        } else {
          _weatherCurrentIndex = Math.max(_weatherCurrentIndex - 1, 0);
        }
        renderWeatherWidget();
      }
    }
    pointerStartX = undefined;
    pointerMoved = false;
  });
  widget.addEventListener('pointercancel', function() {
    var card = this.querySelector('#weatherCardContent');
    if (card) {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0)';
    }
    pointerStartX = undefined;
    pointerMoved = false;
  });
  
  // ---- 长按 -> 手动调整 ----
  var longPressTimer = null;
  widget.addEventListener('pointerdown', function(e) {
    longPressTimer = setTimeout(function() {
      openWeatherEditor();
    }, 400);
  });
  widget.addEventListener('pointerup', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
  widget.addEventListener('pointerleave', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
}

// ============================================================
// 天气小组件：自动检查更新（每 3.5 小时）
// ============================================================
function autoCheckWeatherUpdate() {
  // 门锁：如果已经在更新了，直接退出
  if (_weatherUpdating) return;

  var worlds = DB.worlds || [];
  if (!worlds.length) return;

  var now = Date.now();
  var needUpdate = false;

  // 检查是否有任何一个世界观需要更新
  for (var i = 0; i < worlds.length; i++) {
    var w = worlds[i];
    if (!w.weather) {
      needUpdate = true;
      break;
    }
    var lastUpdate = w.weather.updatedAt || 0;
    if (now - lastUpdate > _weatherUpdateInterval) {
      needUpdate = true;
      break;
    }
  }

  // 如果没有任何世界观需要更新，直接退出
  if (!needUpdate) return;

  // 锁上门，开始更新
  _weatherUpdating = true;

  // 遍历所有需要更新的世界观
  var updatedCount = 0;
  var totalToUpdate = 0;

  // 先数一下有几个需要更新的
  for (var j = 0; j < worlds.length; j++) {
    var wj = worlds[j];
    if (!wj.weather || (Date.now() - (wj.weather.updatedAt || 0) > _weatherUpdateInterval)) {
      totalToUpdate++;
    }
  }

  // 如果没有需要更新的，解锁退出
  if (totalToUpdate === 0) {
    _weatherUpdating = false;
    return;
  }

  // 依次更新每个世界观（串行，不是并行）
  var tried = {};

  function updateNext() {
    var target = null;
    for (var k = 0; k < worlds.length; k++) {
      var wk = worlds[k];
      if (tried[wk.id]) continue;
      if (!wk.weather || (Date.now() - (wk.weather.updatedAt || 0) > _weatherUpdateInterval)) {
        target = wk;
        break;
      }
    }

    if (!target) {
      _weatherUpdating = false;
      renderWeatherWidget();
      return;
    }

    tried[target.id] = true;

    aiGenerateWeather(target.id, function(success) {
      setTimeout(updateNext, 0);
    });
  }

  updateNext();
}

// ============================================================
async function aiGenerateWeather(worldId, callback) {
  var world = (DB.worlds || []).find(function(w) { return w.id === worldId; });
  if (!world) { if (callback) callback(false); return; }
  
  var model = DB.settings.auxModel || DB.settings.chatModel;
  if (!model) {
    popTip('请先在设置里选择模型', {icon:'⚙️', title:'提示'});
    if (callback) callback(false);
    return;
  }
  
  var now = new Date();
  var period = now.getHours() < 6 ? '凌晨' : now.getHours() < 12 ? '上午' : now.getHours() < 18 ? '下午' : '晚上';
  var month = now.getMonth() + 1;
  var season = month >= 3 && month <= 5 ? '春天' : month >= 6 && month <= 8 ? '夏天' : month >= 9 && month <= 11 ? '秋天' : '冬天';
  
  var prompt = '根据世界观生成一条简洁的天气描述。\n\n' +
    '【世界观】' + (world.desc || '现代都市') + '\n' +
    '【时间】' + season + '，' + period + '\n\n' +
    '【要求】\n' +
    '1. desc是一句朴素、清楚的天气描写，就写天气本身（如"晴空万里，微风和煦""细雨绵绵，空气微凉"）。\n' +
    '2. 禁止出现任何人物（他/她/你）、禁止出现屏幕/手机等现代设备意象、禁止把天气写成带情节的小场景。只描写天空、温度、风、光这类自然现象。\n' +
    '3. 只有当世界观明确含魔法/灵气/妖气/赛博等设定时，才可轻微融入；普通现代/都市世界就写正常真实的天气，不要硬凑奇幻词。\n' +
    '4. desc 控制在12-22字，简洁自然。\n' +
    '5. 只输出JSON：{"icon":"天气emoji","state":"晴/雨/雪/多云/阴等","temp":数字,"desc":"天气描写","detail":"补充如湿度/风力"}。不要解释、不要代码块。\n\n' +
    '可用icon：☀️晴 ⛅多云 ☁️阴 🌧雨 ⛈雷暴 ❄️雪 🌫雾 🌪风 🌙夜\n' +
    'temp：-5~45之间合理数字';
  
  try {
    var out = await callAI([{ role: 'user', content: prompt }], model);
    out = out.replace(/```json/gi, '').replace(/```/g, '').trim();
    var match = out.match(/\{[\s\S]*\}/);
    if (match) out = match[0];
    var data = JSON.parse(out);
    
    if (!data.icon || data.temp === undefined || !data.desc) {
      throw new Error('AI 返回数据不完整');
    }
    
    // ===== 如果 AI 没返回 state，用 Emoji 映射兜底 =====
    var state = data.state || mapIconToState(data.icon) || '晴';
    
    world.weather = {
      icon: data.icon || '🌤',
      state: state,
      temp: data.temp !== undefined ? data.temp : 22,
      desc: data.desc || '天气宜人',
      detail: data.detail || '',
      updatedAt: Date.now()
    };
    save();
    
// ===== 向所有关联该世界观的角色发送天气消息（不再限制为当前活跃世界观） =====
var relatedChars = DB.contacts.filter(function(c) { return c.worldId === worldId; });
relatedChars.forEach(function(c) {
  if (!DB.chats[c.id]) DB.chats[c.id] = [];
  var msgs = DB.chats[c.id];
  var sysMsg = '🌤 天气变了：' + data.desc;
  
  // 去重：检查最后一条天气消息是否完全相同
  var lastWeatherMsg = null;
  for (var i = msgs.length - 1; i >= 0; i--) {
    if (msgs[i].role === 'system' && msgs[i].content && msgs[i].content.startsWith('🌤 天气变了')) {
      lastWeatherMsg = msgs[i];
      break;
    }
  }
  var isDuplicate = lastWeatherMsg && lastWeatherMsg.content === sysMsg;
  
  if (!isDuplicate) {
    msgs.push({
      id: 'sys_' + Date.now(),
      role: 'system',
      type: 'system',
      content: sysMsg,
      time: Date.now()
    });
    // 立即保存，保证数据持久化
    save();
    
    // 如果当前正在该角色的聊天界面，立即刷新显示（保持滚动位置）
    if (view && view.type === 'chat' && view.id === c.id) {
      renderChat(true);
    }
  }
});
// 为了保险，再统一保存一次（但已在循环内保存过，这里可留可删，留着无妨）
save();    
    if (callback) callback(true);
  } catch (e) {
    console.error('AI 生成天气失败:', e);
    // 失败也盖个时间戳，避免下一轮立刻疯狂重试（隔一个周期后才会再试）
    if (!world.weather) {
      world.weather = { icon:'🌤', state:'晴', temp:22, desc:'（天气生成失败，稍后重试）', detail:'', updatedAt: Date.now() };
      save();
    } else {
      world.weather.updatedAt = Date.now();
      save();
    }
    if (callback) callback(false);
  }
}

function groupBubble(m){
  if (m.recalled){
    var whoR = (m.role==='user') ? (DB.me.name||'我') : (function(){ var cc=getC(m.charId); return cc?(cc.nick||cc.name):'对方'; })();
    return '<div class="ts">'+esc(whoR)+' 撤回了一条消息</div>';
  }

  var me = (m.role === 'user');
  var c = (!me && m.charId) ? getC(m.charId) : null;

  var av = me ? DB.me.avatar : (c ? c.avatar : '');
  var initial = me ? ((DB.me.name||'我')[0]) : (c ? ((c.name||'?')[0]) : '?');
  var senderName = me ? '' : (c ? (c.nick||c.name) : '未知');

  var body;
  if (m.type === 'image') {
    body = '<div class="mbody" style="display:inline-block;padding:3px;background:'+(me?'var(--theme)':'var(--card)')+'"><img src="'+m.content+'" style="max-width:160px;max-height:220px;border-radius:5px;display:block"></div>';
  } else if (m.type === 'sticker') {
    var s = DB.stickers.find(function(x){ return x.name===m.content; });
    body = s ? '<div style="display:inline-block;padding:0"><img src="'+s.img+'" style="max-width:110px;max-height:110px;border-radius:8px;display:block"></div>' : '<div class="mbody" style="display:inline-block;">[表情:'+esc(m.content)+']</div>';
  } else if (m.type === 'voice') {
    var dur = Math.max(1, Math.min(60, Math.round((m.content||'').length / 2.2)));
    var expandedClass = m.voiceExpanded ? 'expanded' : '';
    body = '<div class="mbody voice-bubble '+expandedClass+'" style="cursor:pointer;display:inline-flex;flex-direction:column;gap:6px;padding:8px 14px;min-width:120px;text-align:left;'+(me?'background:var(--theme);color:#fff;':'')+'" onclick="toggleVoice(\''+m.id+'\')">'+
      '<div class="voice-top">'+
        '<span class="play-icon">▶</span>'+
        '<div class="wave-bars"><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>'+
        '<span class="duration">'+dur+'″</span>'+
      '</div>'+
      '<div class="voice-text">'+esc(m.content)+'</div>'+
    '</div>';
  } else {
    body = '<div class="mbody" style="display:inline-block;max-width:100%;text-align:left;word-break:break-word;white-space:pre-wrap;">'+esc(m.content)+'</div>';
  }

  var nameTag = (!me && senderName)
    ? '<div style="font-size:11px;color:var(--sub);line-height:1.2;margin:0 0 1px 2px;">'+esc(senderName)+'</div>'
    : '';

  var avExtra = nameTag ? 'margin-top:15px;' : '';
  return '<div class="msg '+(me?'me':'')+'" data-mid="'+(m.id||'')+'">'+
    '<div class="avatar" style="'+(av?"background-image:url('"+av+"');":'')+avExtra+'">'+(av?'':initial)+'</div>'+
    '<div class="msg-slide" style="max-width:70%;min-width:0;'+(me?'text-align:right;':'text-align:left;')+'">'+
      nameTag + body +
    '</div>'+
  '</div>';
}

// ==================== 群聊·发消息（通用）====================
function groupPush(m){
  var g = (DB.groups||[]).find(function(x){ return x.id===view.id; });

function groupInsertAt(cid){
  closeModal();

  var name = c.nick||c.name;
  var val = el.value;

  s += '你正在参与一个微信群聊，完全代入你的角色，绝不跳出、绝不承认自己是AI或程序。\n\n';

    });

  if (c.status) s += '\n【你和"' + meName + '"的当前关系】' + c.status.当前关系 + '（好感度' + c.status.好感度 + '）\n';

  s += '8. 禁止输出 [转账]/[撤回]/[拉黑]/[表情]/[心声] 等标记。\n';

// ==================== 群聊·历史转文本（谁说了什么）====================
function buildGroupHistory(g){
  var msgs = DB.chats[g.id] || [];
  var lim = parseInt(DB.settings.groupCtxLimit) || 20;
  if (lim>0 && msgs.length>lim) msgs = msgs.slice(-lim);
  var meName = DB.me.name || '我';
  var lines = msgs.map(function(m){
    if (m.recalled) return null;
    var who = (m.role==='user') ? meName : (function(){ var mc=getC(m.charId); return mc?(mc.nick||mc.name):'某人'; })();
    var content = (m.type==='image') ? '[图片]' : (m.type==='sticker') ? '[表情]' : m.content;
    return who + '：' + content;
  }).filter(Boolean);
  return lines.join('\n');
}

// ==================== 群聊AI·追加一条气泡 ====================
function pushGroupAIMsg(charId, content, type){
  var g = (DB.groups||[]).find(function(x){ return x.id===view.id; });
  if(!g) return;
  var mtype = type || 'text';
  var m = { id:newId(), role:'assistant', charId:charId, type:mtype, content:content, time:Date.now() };
  if(!DB.chats[g.id]) DB.chats[g.id]=[];
  DB.chats[g.id].push(m);
  var pv = mtype==='voice' ? '[语音]' : content;
  g.lastMsg = { text:pv, time:m.time, senderId:charId };
  save();
  renderGroupChat(false);
}

// ==================== 群聊·让选中的角色依次发言 ====================
async function groupAISpeak(chosen){
  var g = (DB.groups||[]).find(function(x){ return x.id===view.id; });
  if(!g){ return; }

  groupReplying = true;
  var btn = document.getElementById('actBtn');
  if(btn){ btn.textContent='…'; btn.disabled=true; }

  try{
    for(var k=0; k<chosen.length; k++){
      var c = chosen[k].c;
      var nm = c.nick || c.name;

      var messages = [
        { role:'system', content: buildGroupSystem(c, g) },
        { role:'user', content: '【群聊记录】\n' + buildGroupHistory(g) + '\n\n现在轮到你（' + nm + '）在群里发言。只输出你要说的话本身，不要写名字前缀。' }
      ];

      var out = '';
      try { out = await callAI(messages, DB.settings.chatModel); }
      catch(e){ continue; }
      out = (out||'').trim();
      if(!out) continue;
      if(/^\[不说\]/.test(out)) continue;

      var wantPrivate = /\[私聊触发\]/.test(out);
      out = out.replace(/\[私聊触发\]/g,'').trim();
      // 注意：这里不再删除 [语音|]，留给下面逐行解析；其他标记照旧删掉
      out = out.replace(/\[(转账|撤回|拉黑玩家|表情|心声)[^\]]*\]/g,'').trim();
      if(!out) continue;

      var esc2 = nm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      var namePrefix = new RegExp('^'+esc2+'\\s*[:：]\\s*');
      var lines = out.split(/\n+/).map(function(x){ return x.trim().replace(namePrefix,''); }).filter(Boolean);

      for(var i=0; i<lines.length; i++){
        var line = lines[i];
        var vm = line.match(/^\[语音\s*[|｜]\s*([\s\S]*?)\]$/);
        if(vm){
          // 是语音消息
          var vtext = vm[1].trim();
          if(vtext) pushGroupAIMsg(c.id, vtext, 'voice');
        } else {
          // 普通文本，清掉可能残留的语音标记碎片
          line = line.replace(/\[语音\s*[|｜]?/g,'').replace(/\]/g,'').trim();
          if(!line) continue;
          pushGroupAIMsg(c.id, line, 'text');
        }
        if(i<lines.length-1) await sleep(400 + Math.min(line.length*28, 1400));
      }
      if (wantPrivate) triggerGroupPrivate(c);
      if(k<chosen.length-1) await sleep(500 + Math.random()*500);
    }
  } catch(e){
    alert('群聊回复失败：' + e.message);
  } finally {
    groupReplying = false;
    var b2 = document.getElementById('actBtn');
    if(b2){ b2.textContent='▶ 回复'; b2.disabled=false; }
  }
}

// ==================== 群聊AI·触发调度 ====================
var groupReplying = false;

function triggerGroupAI(){
  if (groupReplying) return;
  var g = (DB.groups||[]).find(function(x){ return x.id===view.id; });
  if(!g) return;
  if(!DB.settings.chatModel){ alert('请先在 设置 里选择模型'); return; }

  // 找出被@的成员
  var msgs = DB.chats[g.id] || [];
  var lastUserMsg = null;
  for(var i=msgs.length-1;i>=0;i--){ if(msgs[i].role==='user'){ lastUserMsg=msgs[i]; break; } }
  var atText = (lastUserMsg && lastUserMsg.type==='text') ? lastUserMsg.content : '';

  // 计算每个成员权重
  var pool = g.members.map(function(cid){
    var c = getC(cid);
    if(!c) return null;

    // 活动度
    var actMap = { '关':0, '低':0.2, '中':0.6, '高':1.0 };
    var wAct = (actMap[c.activity]!==undefined) ? actMap[c.activity] : 0.6;

    // 粘人度 0~100 → 0.2~1.0
    var cling = (c.clinginess===undefined?50:c.clinginess);
    var wCling = 0.2 + (cling/100)*0.8;

    // 好感度 0~100 → 0.2~1.0
    var fav = (c.status && c.status.好感度!==undefined) ? c.status.好感度 : 50;
    var wFav = 0.2 + (fav/100)*0.8;

    // 对"用户"的关系系数
    var relCoef = 1.0;
    var curRel = (c.status && c.status.当前关系) ? c.status.当前关系 : '';
    if(/恋|爱人|喜欢|暧昧/.test(curRel)) relCoef = 1.3;
    else if(/敌|讨厌|仇/.test(curRel)) relCoef = 0.5;

    var weight = wAct * wCling * wFav * relCoef;

    // 被@ +0.5
    var atMe = atText && atText.indexOf('@'+(c.nick||c.name)) >= 0;
    if(atMe) weight += 0.5;

    return { cid:cid, c:c, weight:weight, atMe:!!atMe };
  }).filter(Boolean);

  // 筛选 + 选人
  var candidates = pool.filter(function(p){ return p.weight > 0.1; });
  if(!candidates.length){
    // 保底：选权重最高的1人
    pool.sort(function(a,b){ return b.weight-a.weight; });
    candidates = pool.slice(0,1);
  }

  // 被@的必选；其余按权重比例随机，总共1~3人
  var chosen = [];
  candidates.forEach(function(p){ if(p.atMe) chosen.push(p); });

  var rest = candidates.filter(function(p){ return !p.atMe; });
  // 按权重加随机扰动排序
  rest.sort(function(a,b){ return (b.weight*Math.random()) - (a.weight*Math.random()); });

  var maxSpeakers = 3;
  for(var j=0; j<rest.length && chosen.length<maxSpeakers; j++){
    // 权重越高越可能入选
    var p = rest[j];
    var prob = Math.min(0.9, p.weight);
    if(chosen.length===0 || Math.random() < prob) chosen.push(p);
  }
  if(!chosen.length && candidates.length) chosen.push(candidates[0]);

  // 限制最多3人
  chosen = chosen.slice(0,3);

  groupAISpeak(chosen);

}

// ==================== 群聊→私聊联动：群里没说的话，私聊破功 ====================
async function triggerGroupPrivate(c){
  // 每日上限：每个角色每天最多因群聊触发2次私聊
  var today = new Date().toDateString();
  if (!c._grpPrivDaily || c._grpPrivDaily.date !== today) {
    c._grpPrivDaily = { date: today, count: 0 };
  }
  if (c._grpPrivDaily.count >= 2) return;
  c._grpPrivDaily.count += 1;
  save();

  var g = (DB.groups||[]).find(function(x){ return x.id===view.id; });
  var groupName = g ? g.name : '群聊';
  var meName = DB.me.name || '我';

  try {
    // 用私聊的完整人设（buildSystem），保证是"真正的TA"
    var sys = buildSystem(c);
    var recentGroup = g ? buildGroupHistory(g) : '';

    var prompt = '【场景】你刚才在群「' + groupName + '」里和大家聊天，但你此刻对"' + meName +
      '"产生了一种当着群里所有人不方便说出口的情绪（比如吃醋、心动、在意、委屈、想单独跟TA说的话）。\n' +
      '于是你现在**私下单独**给"' + meName + '"发微信，说那句在群里没说出口的话。\n\n' +
      '【刚才的群聊记录】\n' + recentGroup + '\n\n' +
      '【要求】\n' +
      '1. 直接输出你私聊发给TA的消息，口语化、简短、符合你的性格。\n' +
      '2. 内容要呼应刚才群里的情境，体现"当着大家不好说、私下才敢说"的反差。\n' +
      '3. 可以多句，用换行分隔。不要写任何括号动作描写，不要写名字前缀。\n' +
      '4. 不要输出任何方括号标记。';

    var messages = [
      { role:'system', content: sys },
      { role:'user', content: prompt }
    ];

    var out = await callAI(messages, DB.settings.chatModel);
    out = (out||'').replace(/<state>[\s\S]*?<\/state>/gi,'').replace(/\[[^\]]*\]/g,'').trim();
    if(!out) return;

    var lines = out.split(/\n+/).map(function(x){ return x.trim(); }).filter(Boolean);

    // 存进【私聊】记录
    if(!DB.chats[c.id]) DB.chats[c.id] = [];
    lines.forEach(function(line){
      DB.chats[c.id].push({ id:newId(), role:'assistant', type:'text', content:line, time:Date.now() });
    });

    // 私聊未读+1（红点提示），并把该角色顶到聊天列表
    c.unread = (c.unread||0) + lines.length;
    c.inChatList = true;
    save();
    if (typeof refreshChatBadges === 'function') refreshChatBadges();

  } catch(e){
    // 静默失败，不打扰群聊
    console.warn('私聊联动失败：', e.message);
  }
}

function attachSwipe() {
  var cells = document.querySelectorAll('.swipe-cell');
  cells.forEach(function(el) {
    if (el._swipeAttached) return;
    el._swipeAttached = true;

    var startX = 0, startY = 0, curX = 0, open = false, moved = false;
    var delWidth = 74;

    el.addEventListener('touchstart', function(e) {
      var t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      moved = false;
      el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', function(e) {
      var t = e.touches[0];
      var dx = t.clientX - startX;
      var dy = t.clientY - startY;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 20) {
        return;
      }
      e.preventDefault();
      moved = true;
      var target = open ? dx - delWidth : dx;
      if (target > 0) target = 0;
      if (target < -delWidth) target = -delWidth;
      curX = target;
      el.style.transform = 'translateX(' + target + 'px)';
    }, { passive: false });

    el.addEventListener('touchend', function(e) {
      el.style.transition = 'transform .2s';
      var shouldOpen = curX < -delWidth * 0.4;
      if (shouldOpen) {
        el.style.transform = 'translateX(-' + delWidth + 'px)';
        open = true;
        curX = -delWidth;
      } else {
        el.style.transform = 'translateX(0)';
        open = false;
        curX = 0;
      }
    }, { passive: true });

    var pStartX = 0,
      pCurX = 0,
      pOpen = false,
      pMoved = false;
    el.addEventListener('pointerdown', function(e) {
      pStartX = e.clientX;
      pMoved = false;
      el.style.transition = 'none';
    });

    el.addEventListener('pointermove', function(e) {
      if (pStartX === undefined) return;
      var dx = e.clientX - pStartX;
      if (Math.abs(dx) < 5) return;
      pMoved = true;
      var target = pOpen ? dx - delWidth : dx;
      if (target > 0) target = 0;
      if (target < -delWidth) target = -delWidth;
      pCurX = target;
      el.style.transform = 'translateX(' + target + 'px)';
    });

    var pointerEnd = function() {
      if (!pMoved) return;
      el.style.transition = 'transform .2s';
      var shouldOpen = pCurX < -delWidth * 0.4;
      if (shouldOpen) {
        el.style.transform = 'translateX(-' + delWidth + 'px)';
        pOpen = true;
        pCurX = -delWidth;
      } else {
        el.style.transform = 'translateX(0)';
        pOpen = false;
        pCurX = 0;
      }
      pStartX = undefined;
    };
    el.addEventListener('pointerup', pointerEnd);
    el.addEventListener('pointercancel', pointerEnd);

    el.addEventListener('click', function(e) {
      if (moved || pMoved) {
        e.stopPropagation();
        e.preventDefault();
        if (open || pOpen) {
          el.style.transition = 'transform .2s';
          el.style.transform = 'translateX(0)';
          open = false;
          pOpen = false;
          curX = 0;
          pCurX = 0;
        }
      }
    }, true);
  });
}

function toggleFold(header) {
  var body = header.nextElementSibling;
  var arrow = header.querySelector('.fold-arrow');
  if (!body || !body.classList.contains('fold-body')) return;
  var isOpen = body.classList.contains('open');
  if (isOpen) {
    body.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
  } else {
    body.classList.add('open');
    if (arrow) arrow.classList.add('open');
  }
}
async function genMemory() {
  var c = getC(editingId);
  if (!c) return;
  var model = DB.settings.auxModel || DB.settings.chatModel;
  if (!model) {
    alert('请先在设置里选择模型');
    return;
  }

  var arr = DB.chats[c.id] || [];
  var todayStr = new Date().toISOString().slice(0, 10);
  var todays = arr.filter(function(m) {
    var t = new Date(m.time || 0);
    return t.toISOString().slice(0, 10) === todayStr;
  });
  if (todays.length < 2) {
    alert('今天聊得还不够多，再多聊几句再生成吧～');
    return;
  }

  var btn = document.getElementById('genMemBtn');
  if (btn) {
    btn.textContent = '⏳ 正在生成…';
    btn.disabled = true;
  }

  try {
    var result = await generateMemoryForChar(c);
    if (result) {
      popTip('今日记忆已生成/追加', { icon: '✅', title: '完成' });
      renderCharEdit();
    } else {
      alert('生成失败，可能今天没有实质内容或 API 出错。');
    }
  } catch (e) {
    alert('生成失败：' + e.message);
  } finally {
    if (btn) {
      btn.textContent = '🧠 AI 生成今日记忆';
      btn.disabled = false;
    }
  }
}

/* ===== AI 润色 ===== */
async function polishChar() {
  const c = getC(editingId);
  const btn = document.getElementById('polishBtn');
  const model = DB.settings.auxModel || DB.settings.chatModel;
  if (!model) {
    alert('请先在 设置 里拉取并选择模型');
    return;
  }

  // 构建当前角色数据（将 undefined 转成空字符串）
  const cur = {
    真名: c.name || '',
    性别: c.gender || '',
    年龄: c.age || '',
    生日: c.birthday || '',
    身份职业: c.job || '',
    家庭出身: c.family || '',
    身体数据: c.body || '',
    外貌: c.pLook || '',
    性格关键词: c.pKeywords || '',
    说话风格: c.pStyle || '',
    成长经历: c.pBack || '',
    日常作息: c.pDaily || '',
    喜好厌恶: c.pLike || '',
    语言习惯: c.pLang || '',
    事例台词: c.sampleLines || '',
    负向约束: c.negative || '',
    线上人设: c.pOnlinePersona || '',
    开场白: c.opening || '',
    补充: c.pExtra || ''
  };

  // 所有中文键名列表（用于 prompt 和 映射）
  const chineseKeys = [
    '真名', '性别', '年龄', '生日', '身份职业', '家庭出身', '身体数据',
    '外貌', '性格关键词', '说话风格', '成长经历', '日常作息', '喜好厌恶',
    '语言习惯', '事例台词', '负向约束', '线上人设', '开场白', '补充'
  ];

  const pr = `你是一位擅长塑造“真人感”角色的资深设定师。用户已经提供了一些基础框架，现在需要你把这些信息润色成生动、自然、有血有肉的文字，而不是填空式的标签堆砌。

【输入的角色信息】
${JSON.stringify(cur, null, 2)}

【核心要求】
1. **已填字段**：优化措辞和逻辑，让它读起来像小说人物档案或真实的社交简介，自然流畅，不要生硬的短句罗列。
2. **空白字段**：根据已有性格和经历，进行合理且有灵气的补全（例如：如果性格内敛，可以补充“习惯用点头代替回应，但悄悄记住对方喜好”这类细节）。
3. **风格忌讳（非常重要）**：绝对禁止使用“性格开朗”、“善良”、“喜欢看书”这类干瘪词汇。必须用**具体的行为细节和习惯**来展现人物（比如：“遇到冷场会主动递零食打破僵局”、“书房里堆满了看到一半就睡着的推理小说”）。
4. **成长经历**：必须写清楚“遭遇了什么 → 所以变成了什么样的人”，因果链要清晰，避免流水账。
5. **说话与台词**：事例台词必须真实自然，像活人说话，禁止书面语、播音腔。线上人设要写出具体的微信使用习惯（例如：“只发表情包不打字”、“看到消息隔半小时才回”、“爱用波浪号～”）。
6. **开场白**：必须是对方一打开聊天框就能看到的、极具个人特色的第一句话。极度口语化，带有人设辨识度（可以带一个轻微的口癖或习惯用语）。

【视角约束】
- 所有描述使用第三人称（他/她），不要用“我”指代角色。
- 角色与用户的关系中，用“用户”代替“我”。
- 开场白可以用第一人称。

【输出格式 - 严格遵守】
- 只输出一个 JSON 对象。
- 键名必须使用中文，与下面列表完全一致，一个都不能少：
  ${chineseKeys.join('、')}
- 必须包含以上所有键，即使值为空字符串也必须包含，绝对不允许省略任何键。
- 不要任何解释、不要代码块标记。只输出 JSON。`;

  btn.textContent = '⏳ 润色中…（请稍候）';
  btn.disabled = true;

  try {
    let out = await callAI([{ role: 'user', content: pr }], model);
    out = out.replace(/```json/gi, '').replace(/```/g, '').trim();
    const m = out.match(/\{[\s\S]*\}/);
    if (m) out = m[0];
    const r = JSON.parse(out);

    // ---- 映射表：中文键 → 实际字段名 ----
    const map = {
      真名: 'name',
      性别: 'gender',
      年龄: 'age',
      生日: 'birthday',
      身份职业: 'job',
      家庭出身: 'family',
      身体数据: 'body',
      外貌: 'pLook',
      性格关键词: 'pKeywords',
      说话风格: 'pStyle',
      成长经历: 'pBack',
      日常作息: 'pDaily',
      喜好厌恶: 'pLike',
      语言习惯: 'pLang',
      事例台词: 'sampleLines',
      负向约束: 'negative',
      线上人设: 'pOnlinePersona',
      开场白: 'opening',
      补充: 'pExtra'
    };

    // ---- 尝试中文键 ----
    let usedChinese = true;
    for (const cnKey of chineseKeys) {
      if (r[cnKey] !== undefined && r[cnKey] !== null) {
        const field = map[cnKey];
        if (field) c[field] = String(r[cnKey]);
      } else {
        usedChinese = false;
      }
    }

    // ---- 如果中文键没命中任何字段，尝试英文键（容错） ----
    if (!usedChinese) {
      const engMap = {
        name: 'name',
        gender: 'gender',
        age: 'age',
        birthday: 'birthday',
        job: 'job',
        family: 'family',
        body: 'body',
        pLook: 'pLook',
        pKeywords: 'pKeywords',
        pStyle: 'pStyle',
        pBack: 'pBack',
        pDaily: 'pDaily',
        pLike: 'pLike',
        pLang: 'pLang',
        sampleLines: 'sampleLines',
        negative: 'negative',
        pOnlinePersona: 'pOnlinePersona',
        opening: 'opening',
        pExtra: 'pExtra'
      };
      let anyMatched = false;
      for (const enKey in engMap) {
        if (r[enKey] !== undefined && r[enKey] !== null) {
          const field = engMap[enKey];
          if (field) c[field] = String(r[enKey]);
          anyMatched = true;
        }
      }
      if (!anyMatched) {
        // 极端情况：AI 返回了奇怪的键名，直接弹出原始内容帮助调试
        console.warn('AI 返回的 JSON 键名无法识别:', Object.keys(r));
        alert('AI 返回的格式与预期不符，请检查 API 响应或重试。\n返回内容：' + out.slice(0, 200));
        btn.textContent = '✨ AI 润色 / 补全人设';
        btn.disabled = false;
        return;
      }
    }

    save();
    renderCharEdit();
    alert('✅ 润色完成～可再手动微调');
  } catch (e) {
    alert('润色失败：' + e.message + '\n(可重试一次)');
  } finally {
    btn.textContent = '✨ AI 润色 / 补全人设（用辅助模型）';
    btn.disabled = false;
  }
}

  // 修复：完善评论HTML结构，增加点击回复功能
  const cmtHtml = (m.comments || []).map(function(cm) {
    var cc = nameOf(cm.by);

      '<span style="color:var(--sub)">：</span><span style="color:var(--text)">' + esc(cm.text) + '</span>' +
      '</div>';
  }).join('');
  
  const foot=(likeHtml||cmtHtml)?`<div style="margin-top:8px;border-radius:6px;overflow:hidden">${likeHtml}${cmtHtml}</div>`:'';
  
  // 修复：在底部操作栏增加“💬 评论”按钮

async function replyToMyComment(pid,myText,toId){
  const m=DB.moments.find(x=>x.id===pid);if(!m)return;
  const model=DB.settings.auxModel||DB.settings.chatModel;if(!model)return;
  let targetId=toId;
  if(!targetId){

async function settleMoments() {

    }).map(function(m) { return m.id; });

      var m = DB.moments.find(function(x) { return x.id === pid; });
      if (!m || m._settled) continue;

      if (!m._due) {
        m._due = now + (20000 + Math.random() * 100000);

        continue;
      }

async function checkAutoGreet() {

  const now = new Date();
  const hour = now.getHours();

  if (hour >= 6 && hour < 9) slot = '清晨';
  else if (hour >= 9 && hour < 12) slot = '上午';
  else if (hour >= 12 && hour < 14) slot = '中午';
  else if (hour >= 14 && hour < 18) slot = '下午';
  else if (hour >= 18 && hour < 23) slot = '夜晚';
  else slot = '深夜';

  const today = now.toDateString();

    // ===== 保留原有：时间衰减检查 =====
    checkTimeDecay(c);

    // ===== 保留原有：被角色拉黑，跳过主动问候 =====

    } else {
      // 最后一条是你发的（或没消息）= 你回了 → 碰壁计数清零，恢复正常
      c.greetLog.noReplyCount = 0;
    }

    // ===== 保留原有：问候记录（每天每个时段只能发一次） =====
    if (!c.greetLog || c.greetLog.date !== today) {
      c.greetLog = { date: today, 清晨: false, 上午: false, 中午: false, 下午: false, 夜晚: false, 深夜: false, lastTime: 0, noReplyCount: 0 };
    }

    if (c.greetLog[slot]) continue;

// ==================== 监控功能 ====================

// 【辅助1】找出"此刻"命中的行程条目（没有则返回 null）
function findCurrentScheduleItem(c) {
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  var todaySch = (c.schedules || []).find(function(s) { return s.date === todayStr; });
  if (!todaySch || !todaySch.items || !todaySch.items.length) return null;

  var nowMin = today.getHours() * 60 + today.getMinutes();
  var hit = null;
  todaySch.items.forEach(function(it) {
    var sp = (it.start || '00:00').split(':');
    var startMin = parseInt(sp[0]) * 60 + parseInt(sp[1]);
    if (startMin <= nowMin) hit = it;
  });
  if (!hit) hit = todaySch.items[todaySch.items.length - 1];
  return hit;
}

// 【辅助2】取最近聊天记录 + 距上次消息多久
function getRecentChatForWatch(cid) {
  var msgs = (DB.chats && DB.chats[cid]) ? DB.chats[cid] : [];
  var valid = msgs.filter(function(m) { return m && m.role !== 'system'; });
  var recent = valid.slice(-7);

  var lines = recent.map(function(m) {
    var who = (m.role === 'user') ? '用户' : 'TA';
    var body;
    if (m.type === 'text') body = m.content || '';
    else if (m.type === 'voice') body = '[语音]' + (m.content || '');
    else if (m.type === 'image') body = '[图片]';
    else if (m.type === 'sticker') body = '[表情]';
    else if (m.type === 'transfer') body = '[转账 ' + (m.amount || '') + ']';
    else body = m.content || '[消息]';
    if (m.recalled) body = '[撤回了一条消息]';
    return who + '：' + body;
  }).join('\n');

  var last = valid[valid.length - 1];
  var gapMin = last && last.time ? Math.round((Date.now() - last.time) / 60000) : null;

  return { lines: lines || '（最近没有聊天记录）', gapMin: gapMin };
}

// 【辅助3】清理录像：没收藏的最多留 10 条，收藏的永久保留
function trimWatchLogs(c) {
  var starred = c.watchLogs.filter(function(w) { return w.starred; });
  var normal  = c.watchLogs.filter(function(w) { return !w.starred; });
  normal.sort(function(a, b) { return b.time - a.time; });
  if (normal.length > 10) normal = normal.slice(0, 10);
  c.watchLogs = starred.concat(normal).sort(function(a, b) { return b.time - a.time; });
}

var _scheduleDate = null; // 当前查看的日期字符串 '2026-07-19'

function renderSchedule() {
  var c = getC(view.id);
  if (!c) { goHome(); return; }
  var _cb = document.getElementById('chatBottom'); if (_cb) _cb.remove(); // 清掉残留的聊天输入框

  showChrome(true, false);
  statusbar.classList.add('dark');
  tbTitle.textContent = (c.nick || c.name) + ' 的行程';
  tbLeft.textContent = '‹';
  tbLeft.onclick = function() { 
    if (window._scheduleTimer) { clearTimeout(window._scheduleTimer); window._scheduleTimer = null; }
    if (window._scheduleFrom === 'chat') { window._scheduleFrom = null; view = { type: 'chat', id: c.id }; }
    else view = { type: 'heartDetail', id: c.id }; 
    render(); 
  };
  tbRight.textContent = '';
  tbRight.onclick = null;

  // 初始化日期为今天
  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  if (!_scheduleDate) _scheduleDate = todayStr;

  var schedules = c.schedules || [];
  schedules.sort(function(a, b) { return b.date.localeCompare(a.date); });

  var currentDay = schedules.find(function(s) { return s.date === _scheduleDate; });
  var dateNavHtml = buildDateNav(c, schedules, todayStr);

  var html = '<div style="padding:12px 16px 20px;">';
  html += dateNavHtml;
  html += '<div style="height:1px;background:var(--line);margin:8px 0 16px;"></div>';

  var isToday = (_scheduleDate === todayStr);

  // ===== 计算当前进行中的时间段索引（用于高亮） =====
  var now = new Date();
  var nowMinutes = now.getHours() * 60 + now.getMinutes();
  var currentItemIndex = -1;

  if (currentDay && currentDay.items && currentDay.items.length && isToday) {
    var items = currentDay.items;
    for (var i = 0; i < items.length; i++) {
      var startParts = items[i].start.split(':');
      var startMinutes = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);
      if (startMinutes <= nowMinutes) {
        currentItemIndex = i;
      }
    }
  }

  // ===== 渲染卡片 =====
  if (currentDay && currentDay.items && currentDay.items.length) {
    var items = currentDay.items;
    var cardsHtml = items.map(function(item, idx) {
      var startParts = item.start.split(':');
      var startMinutes = parseInt(startParts[0]) * 60 + parseInt(startParts[1]);
      var status = 'future';
      if (isToday) {
        if (startMinutes < nowMinutes) status = 'past';
        else if (startMinutes <= nowMinutes + 60) status = 'current';
        else status = 'future';
      } else {
        status = 'past';
      }
      // 额外标记当前进行中的索引
      var isCurrent = (idx === currentItemIndex && isToday);
      return buildScheduleCard(item, status, isCurrent);
    }).join('');

    html += cardsHtml;

    // ===== 刷新按钮：只有今天且有数据时才显示 =====
    if (isToday) {
      html += '<div style="display:flex;justify-content:center;margin-top:16px;">';
      html += '<button class="btn" style="width:80%;margin:0 auto;display:block;" onclick="generateSchedule(\'' + c.id + '\')">🔄 刷新今日行程（5💗）</button>';
      html += '</div>';
    }

  } else {
    // 没有行程数据
    if (isToday) {
      html += '<div style="text-align:center;padding:40px 0 20px;color:var(--sub);font-size:14px;line-height:2;">';
      html += '🌙 今天还没留下轨迹';
      html += '</div>';
      html += '<div style="display:flex;justify-content:center;">';
      html += '<button class="btn" style="width:80%;margin:0 auto;display:block;" onclick="generateSchedule(\'' + c.id + '\')">✨ 生成今日行程（5💗）</button>';
      html += '</div>';
    } else {
      html += '<div style="text-align:center;padding:50px 0;color:var(--sub);font-size:14px;">📭 这天没有留下行程记录</div>';
    }
  }

  html += '<div style="text-align:center;margin-top:20px;font-size:11px;color:var(--sub);opacity:0.4;">只保留最近 5 天的行程 · 每次生成消耗 5💗</div>';
  html += '</div>';
  content.innerHTML = html;

  // ===== 定时器：计算到下一个时间段的剩余时间，到时自动刷新 =====
  if (window._scheduleTimer) { clearTimeout(window._scheduleTimer); window._scheduleTimer = null; }

  if (isToday && currentDay && currentDay.items && currentDay.items.length) {
    var items = currentDay.items;
    var nextStartMinutes = null;
    var nowMinutesNow = new Date().getHours() * 60 + new Date().getMinutes();

    for (var j = 0; j < items.length; j++) {
      var parts = items[j].start.split(':');
      var startMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      if (startMin > nowMinutesNow) {
        nextStartMinutes = startMin;
        break;
      }
    }

    if (nextStartMinutes !== null) {
      var nowMs = Date.now();
      var targetDate = new Date();
      targetDate.setHours(Math.floor(nextStartMinutes / 60), nextStartMinutes % 60, 0, 0);
      var delay = targetDate.getTime() - nowMs + 1000; // 加1秒缓冲
      if (delay > 0 && delay < 24 * 60 * 60 * 1000) {
        window._scheduleTimer = setTimeout(function() {
          if (view.type === 'schedule') {
            renderSchedule();
          }
        }, delay);
      }
    }
  }
}

function buildDateNav(c, schedules, todayStr) {
  // 从 schedules 中提取所有日期，加上今天
  var dates = {};
  schedules.forEach(function(s) { dates[s.date] = true; });
  // 确保今天在列表里（即使没有数据）
  dates[todayStr] = true;

  var dateList = Object.keys(dates).sort();
  // 如果当前日期不在列表中，加入并排序
  if (dateList.indexOf(_scheduleDate) === -1) {
    dateList.push(_scheduleDate);
    dateList.sort();
  }

  var currentIndex = dateList.indexOf(_scheduleDate);
  var prevDate = currentIndex > 0 ? dateList[currentIndex - 1] : null;
  var nextDate = currentIndex < dateList.length - 1 ? dateList[currentIndex + 1] : null;

  var displayDate = _scheduleDate;
  var displayLabel = _scheduleDate;
  if (_scheduleDate === todayStr) {
    displayLabel = '今天';
  } else {
    // 格式化显示
    var parts = _scheduleDate.split('-');
    displayLabel = parts[1] + '月' + parts[2] + '日';
  }

  var hasPrev = prevDate !== null;
  var hasNext = nextDate !== null;

  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;">' +
    '<span style="font-size:20px;cursor:pointer;color:var(--sub);' + (hasPrev ? '' : 'opacity:0.2;pointer-events:none;') + '" onclick="' + (hasPrev ? 'changeScheduleDate(\'' + prevDate + '\')' : '') + '">‹</span>' +
    '<span style="font-size:16px;font-weight:500;color:var(--text);">' + displayLabel + '</span>' +
    '<span style="font-size:20px;cursor:pointer;color:var(--sub);' + (hasNext ? '' : 'opacity:0.2;pointer-events:none;') + '" onclick="' + (hasNext ? 'changeScheduleDate(\'' + nextDate + '\')' : '') + '">›</span>' +
    '</div>';
}

function addMemo(cid, content, priority, type) {
  var c = getC(cid);
  if (!c) return;
  if (!c.memories) c.memories = [];
  var mem = {
    id: 'mem_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    time: Date.now(),
    content: content,
    type: type || 'manual',     // 'manual' | 'auto'
    priority: priority || 'important',
    edited: false
  };
  c.memories.push(mem);
  // 同时写入 chapters（供 AI 使用）
  if (!c.chapters) c.chapters = [];
  var dateStr = new Date().toISOString().slice(0,10);
  c.chapters.push({ date: dateStr, content: '[记忆] ' + content });
  save();
}

function deleteMemo(cid, mid) {
  var c = getC(cid);
  if (!c) return;
  var mem = c.memories.find(function(m) { return m.id === mid; });
  if (!mem) return;
  popConfirm('确定要删除这条记忆吗？', function() {
    c.memories = c.memories.filter(function(m) { return m.id !== mid; });
    // 同步从 chapters 中移除对应的条目（按内容匹配，不精确则跳过）
    // 简单起见，我们按日期和内容前缀删除最近一条匹配的章节
    var idx = c.chapters.findIndex(function(ch) { return ch.content === '[记忆] ' + mem.content; });
    if (idx > -1) c.chapters.splice(idx, 1);
    save();
    renderMemoDetail(cid);
  }, { icon: '🗑️', title: '删除确认' });
}

async function generateMemo(cid) {

  if (!c) return;
  var model = DB.settings.auxModel || DB.settings.chatModel;
  if (!model) { alert('请先在设置里选择模型'); return; }

  var arr = DB.chats[cid] || [];
  var today = new Date();
  var todayStr = today.toISOString().slice(0,10);
  var todays = arr.filter(function(m) {
    var t = new Date(m.time || 0);
    return t.toISOString().slice(0,10) === todayStr;
  });
  if (todays.length < 2) { alert('今天聊得还不够多，再多聊几句再生成吧～'); return; }

  var btn = document.querySelector('#modal .btn') || document.querySelector('.btn[onclick*="generateMemo"]');
  if (btn) { btn.textContent = '⏳ 生成中…'; btn.disabled = true; }

  try {
    // 直接复用自动版的核心逻辑（真名优先 + 同时更新关系 + 统一prompt）
    var ok = await generateMemoryForChar(c);
    renderMemoDetail(c.id);
    if (ok) {
      popTip('记忆已更新，关系也同步啦', { icon: '✅', title: '生成完成' });
    } else {
      popTip('今天没提炼出新记忆', { icon: 'ℹ️', title: '完成' });
    }
  } catch (e) {
    popTip(e.message || '生成失败', { icon: '⚠️', title: '生成失败' });
  } finally {
    if (btn) { btn.textContent = '🤖 AI 生成今日记忆'; btn.disabled = false; }
  }
}

function checkTimeDecay(c) {
  if (!c || !c.lastActive) return;
  
  // 【新增】自动解除角色拉黑逻辑
  if (c.isBlockedByChar && c.blockedByCharAt) {
    var now = Date.now();
    var blockDuration = now - c.blockedByCharAt;
    var autoUnblockTime = 0;

    // 小情绪：4-12小时随机，这里取最大值12小时(43200000ms)作为保底自动解除时间
    // 大矛盾：24小时(86400000ms)
    if (c.blockedType === '小情绪') {
      autoUnblockTime = 12 * 60 * 60 * 1000; 
    } else {
      autoUnblockTime = 24 * 60 * 60 * 1000;
    }

    if (blockDuration >= autoUnblockTime) {
      c.isBlockedByChar = false;
      c.blockedByCharAt = 0;
      c.blockedType = '';
      // 如果当前正在聊天界面，插入一条系统提示
      if (view.type === 'chat' && view.id === c.id) {
        insertSystemMessage('🔓 ' + (c.nick || c.name) + ' 气消了，解除了对你的拉黑。');
      }
      save();
    }
  }
  // 【新增结束】

  // 原有的衰减频率限制（每2小时检查一次数值衰减）
  if (c._lastDecayCheck && Date.now() - c._lastDecayCheck < 7200000) return;

  var hours = (Date.now() - c.lastActive) / (1000 * 60 * 60);
  var decay = 0, trustDecay = 0, tensionRise = 0;

  if (hours > 72) { decay = -8; trustDecay = -5; tensionRise = 5; }
  else if (hours > 48) { decay = -5; trustDecay = -3; tensionRise = 3; }
  else if (hours > 24) { decay = -3; trustDecay = -2; tensionRise = 2; }
  else if (hours > 12) { decay = -1; trustDecay = -0.5; tensionRise = 1; }
  else { return; }

  c.status.好感度 = clamp(c.status.好感度 + decay);
  c.status.信任度 = clamp(c.status.信任度 + trustDecay);
  c.status.紧张感 = clamp(c.status.紧张感 + tensionRise);
syncClinginess(c);

  c._lastDecayCheck = Date.now();
  save();

  if (view.type === 'chat' && view.id === c.id) {
    insertSystemMessage('💤 你冷落了 ' + (c.nick || c.name) + ' ' + Math.round(hours) + ' 小时，TA 似乎有些疏远了。');
  }
}

function parseAiLine(line){

  var m;

  // 转账
  if (m = line.match(/^\[转账[|｜](.+?)(?:[|｜]([\s\S]*))?\]$/)) {
    return { type: 'transfer', from: 'ai', amount: m[1].trim(), content: (m[2] || '').trim() };
  }
  // 红包
  if (m = line.match(/^\[红包[|｜](.+?)(?:[|｜]([\s\S]*))?\]$/)) {
    return { type: 'transfer', amount: m[1].trim(), content: (m[2] || '').trim() };
  }
  // 语音
  if (m = line.match(/^\[语音[|｜]([\s\S]+)\]$/)) {
    return { type: 'voice', content: m[1].trim() };
  }
  // 表情
  if (m = line.match(/^\[表情[|｜](.+?)\]$/)) {
    return { type: 'sticker', content: m[1].trim() };
  }
  // 撤回
  if (m = line.match(/^\[撤回[|｜]([\s\S]+)\]$/)) {
    return { type: 'text', recalled: true, recalledContent: m[1].trim(), reveal: false };
  }
  // 拉黑玩家 —— 只返回类型，具体逻辑交给调用者处理
  if (m = line.match(/^\[拉黑玩家[|｜](.+?)\]$/)) {
    return { type: 'block_player', reason: m[1].trim() };
  }
  // 接收转账
  if (m = line.match(/^\[接收\]/)) {
    return { type: 'transfer_accept' };
  }
  // 退回转账
  if (m = line.match(/^\[退回\]/)) {
    return { type: 'transfer_refund' };
  }
  // 普通文本
  return { type: 'text', content: line };
}

/* ===== ⏱️ 专注番茄钟 ===== */
let focusTimer=null,focusEnd=0,focusPhase='idle',focusLeaveAt=0,focusSuper=null,focusCount=0;
function saveFocusState(){try{localStorage.setItem('focusState',JSON.stringify({phase:focusPhase,end:focusEnd,sup:focusSuper,count:focusCount,leaveAt:focusLeaveAt}));}catch(e){}}
function clearFocusState(){try{localStorage.removeItem('focusState');}catch(e){}}
function renderFocus(){
  if(focusPhase==='work'&&!focusTimer)focusPhase='idle';
  showChrome(true,false);statusbar.classList.add('dark');tbTitle.textContent='专注';tbLeft.textContent='‹';tbLeft.onclick=()=>{if(focusPhase!=='idle'&&!confirm('正在专注中，离开会放弃本次，确定？'))return;stopFocus(true);goHome();};tbRight.textContent='';tbRight.onclick=null;
  const cs=DB.contacts.filter(c=>!c._draft);if(!cs.length){content.innerHTML='<div class="empty">先去通讯录建一个角色<br>Ta可以当你的学习监督员～</div>';return;}
  if(!focusSuper||!getC(focusSuper))focusSuper=cs[0].id;
  const notifOk=('Notification'in window)&&Notification.permission==='granted';
  const remain=focusPhase!=='idle'?Math.max(0,Math.round((focusEnd-Date.now())/1000)):((DB.settings.focusWork||25)*60);
  const mm=String(Math.floor(remain/60)).padStart(2,'0'),ss=String(remain%60).padStart(2,'0');
  const phaseTxt=focusPhase==='work'?'专注中':focusPhase==='break'?'休息中':'准备开始';
  const color=focusPhase==='break'?'#4a90d9':'var(--theme)';
  content.innerHTML=`<div style="text-align:center;padding:24px 0 10px"><div style="font-size:14px;color:var(--sub)">${phaseTxt}</div><div id="focusClock" style="font-size:64px;line-height:1.1;font-weight:200;color:${color};margin:12px 0;font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:2px">${mm}:${ss}</div><div style="font-size:12px;color:var(--sub);padding:0 16px">${focusPhase==='work'?'切走APP超30秒会被监督员发现哦👀｜':'今日已完成 '}${focusCount} 个番茄🍅</div></div>
  ${focusPhase==='idle'?`<div class="section"><div class="row"><label>监督员</label><select id="focusSup" onchange="focusSuper=this.value" style="flex:1;border:none;background:transparent;color:var(--text);text-align:right;font-size:14px;min-width:0">${cs.map(c=>`<option value="${c.id}" ${c.id===focusSuper?'selected':''}>${esc(c.nick||c.name)}</option>`).join('')}</select></div><div class="row"><label>专注时长</label><input id="focusWork" type="number" value="${DB.settings.focusWork||25}" style="width:60px;border:none;background:transparent;color:var(--text);text-align:right;font-size:14px;margin-left:auto"><span style="color:var(--sub);font-size:13px;flex-shrink:0;margin-left:4px">分钟</span></div><div class="row"><label>休息时长</label><input id="focusBreak" type="number" value="${DB.settings.focusBreak||5}" style="width:60px;border:none;background:transparent;color:var(--text);text-align:right;font-size:14px;margin-left:auto"><span style="color:var(--sub);font-size:13px;flex-shrink:0;margin-left:4px">分钟</span></div></div>${notifOk?'':`<button class="btn gray" onclick="askNotify()">🔔 开启桌面通知（可选）</button>`}<button class="btn" onclick="startFocus()">▶ 开始专注</button><button class="btn gray" onclick="testDistract()">🔧 测试分心提醒</button><div class="hint">选一个角色当监督员。专注时你切走APP超过30秒，回来时Ta会按性格催你；完成一个番茄，Ta的心动值+5💗。（状态会保存，UC刷新也不怕）</div>`:`<button class="btn" style="background:#e34" onclick="popConfirm('确定放弃本次专注吗？',function(){stopFocus(true);render();},{icon:'😔',title:'放弃专注'})">✕ 放弃</button><div class="hint">${notifOk?'✅ 桌面通知已开启。':'⚠️ 未开通知，提醒将在你切回来时弹出。'}保持专注，加油～</div>`}<div style="height:20px"></div>`;
}
function askNotify(){if(!('Notification'in window)){alert('你的浏览器不支持桌面通知');return;}Notification.requestPermission().then(p=>{alert(p==='granted'?'通知已开启～':'已拒绝也没关系，切回来会有弹窗提醒');render();});}
function pushNotify(title,body){if(('Notification'in window)&&Notification.permission==='granted'){try{new Notification(title,{body:body||''});}catch(e){}}}
function showFocusToast(name,text,persist){const old=document.getElementById('ftoast');if(old)old.remove();const d=document.createElement('div');d.id='ftoast';d.style.cssText='position:fixed;left:50%;transform:translateX(-50%);top:54px;z-index:99999;width:calc(min(400px,100vw) - 24px);max-width:376px;background:#fff;border:2px solid #07c160;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.35);padding:12px 14px;color:#111';d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="color:#07c160;font-size:14px">💬 ${esc(name)}</b><span style="cursor:pointer;font-size:20px;line-height:1;padding:0 4px;color:#999" onclick="this.closest('#ftoast').remove()">×</span></div><div id="ftoastBody" style="font-size:14px;white-space:pre-wrap;line-height:1.5;color:#111">${esc(text)}</div>`;document.body.appendChild(d);if(!persist)setTimeout(()=>{const t=document.getElementById('ftoast');if(t)t.remove();},9000);}
function startFocus(){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}const w=parseInt(document.getElementById('focusWork').value)||25;const b=parseInt(document.getElementById('focusBreak').value)||5;DB.settings.focusWork=w;DB.settings.focusBreak=b;focusSuper=document.getElementById('focusSup').value;focusPhase='work';focusEnd=Date.now()+w*60000;focusLeaveAt=0;saveFocusState();save();runFocus();render();}
function runFocus(){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}focusTimer=setInterval(()=>{const remain=Math.round((focusEnd-Date.now())/1000);const el=document.getElementById('focusClock');if(el&&remain>=0)el.textContent=String(Math.floor(remain/60)).padStart(2,'0')+':'+String(remain%60).padStart(2,'0');if(remain<=0)focusPhaseEnd();},1000);}
function focusPhaseEnd(){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}if(focusPhase==='work'){focusCount++;const c=getC(focusSuper);if(c){addHeart(c,5,'陪你专注完成一个番茄🍅');distractMsg(c,'（对方刚刚认真完成了一个专注番茄钟，很努力。请以你的身份口吻简短地夸奖/鼓励一下）','🍅 完成一个番茄！');}pushNotify('🍅 专注完成！','休息一下吧～');focusPhase='break';focusEnd=Date.now()+(DB.settings.focusBreak||5)*60000;saveFocusState();runFocus();render();}else{pushNotify('☕ 休息结束','开始下一个番茄吧！');focusPhase='idle';clearFocusState();render();showFocusToast('⏱️ 专注','休息结束啦，继续加油～');}}
function stopFocus(giveUp){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}if(giveUp&&focusPhase==='work'){const c=getC(focusSuper);if(c)distractMsg(c,'（对方中途放弃了这次专注学习。请以你的身份口吻，轻轻表达一点小失望或无奈的关心，简短）','😔 中途放弃了');}focusPhase='idle';focusLeaveAt=0;clearFocusState();}
function testDistract(){const sel=document.getElementById('focusSup');const c=getC(sel?sel.value:focusSuper);if(!c){alert('先选个监督员');return;}distractMsg(c,'（对方开小差跑去玩了一会儿。请以你的身份口吻，抓包式地提醒Ta别走神、快回来学习，简短有性格）','👀 抓到你走神了');}
async function distractMsg(c,nudge,placeholder){
  showFocusToast(c.nick||c.name,(placeholder||'正在说话')+'…',true);
  const model=DB.settings.chatModel;
  if(!model){const b=document.getElementById('ftoastBody');if(b)b.textContent='请先在设置里选择模型';return;}
  try{
    const messages=[{role:'system',content:buildSystem(c)},{role:'system',content:'【立即生效·最高优先级】现在是微信线上，只输出口语短句，禁止括号动作描写。'},{role:'user',content:nudge}];
    let out=await callAI(messages,model);out=applyState(c,out);
    const lines=out.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    DB.chats[c.id]=DB.chats[c.id]||[];
    lines.forEach(line=>{const m=Object.assign({id:newId(),role:'assistant',time:Date.now()},parseAiLine(line));DB.chats[c.id].push(m);});
    c.inChatList=true;save();
    pushNotify(c.nick||c.name,out.slice(0,60));
    const body=document.getElementById('ftoastBody');if(body)body.textContent=out;else showFocusToast(c.nick||c.name,out);
    if(view.type==='chat'&&view.id===c.id)renderChat();
  }catch(e){const body=document.getElementById('ftoastBody');if(body)body.textContent='监督员没说出话（'+e.message+'）';}
}
document.addEventListener('visibilitychange',()=>{
  if (!document.hidden) {
    triggerDailyMemoryCheck();
  }
  if(focusPhase!=='work'||!focusTimer)return;
  if(document.hidden){focusLeaveAt=Date.now();saveFocusState();}
  else if(focusLeaveAt){const gap=Date.now()-focusLeaveAt;focusLeaveAt=0;saveFocusState();if(gap>30000){const c=getC(focusSuper);if(c)distractMsg(c,'（对方在专注学习期间，切走手机跑去玩了'+Math.round(gap/1000)+'秒才回来。请以你的身份口吻，抓包式地提醒/催促Ta别开小差、快回来学习，要简短、有性格）','👀 发现你走神了 '+Math.round(gap/1000)+' 秒');}}
});
window.addEventListener('pagehide',()=>{if(focusPhase==='work'){focusLeaveAt=Date.now();saveFocusState();}});
function restoreFocusState(){
  let s;try{s=JSON.parse(localStorage.getItem('focusState'));}catch(e){}
  if(!s||s.phase==='idle'||!s.phase)return;
  focusSuper=s.sup;focusCount=s.count||0;focusPhase=s.phase;focusEnd=s.end;
  if(Date.now()>=s.end){focusPhase='idle';clearFocusState();return;}
  if(s.leaveAt){const gap=Date.now()-s.leaveAt;if(gap>30000){const c=getC(focusSuper);if(c)setTimeout(()=>distractMsg(c,'（对方在专注学习期间离开了'+Math.round(gap/1000)+'秒，还把页面切走了才回来。请以你的身份口吻，抓包式地提醒Ta别开小差、快回来学习，简短有性格）','👀 你刚刚离开了 '+Math.round(gap/1000)+' 秒'),1200);}}
  focusLeaveAt=0;saveFocusState();runFocus();
}

async function callAI(messages,model){const s=DB.settings;if(!s.apiUrl||!s.apiKey)throw new Error('请先在设置里填写API');const res=await fetch(s.apiUrl+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.apiKey},body:JSON.stringify({model:model||s.chatModel,messages})});if(!res.ok)throw new Error('HTTP '+res.status);const d=await res.json();return d.choices[0].message.content;}
async function genWorld(){const c=getC(editingId);const btn=document.getElementById('genWorldBtn');const model=DB.settings.auxModel||DB.settings.chatModel;if(!model){alert('请先在设置里选择模型');return;}btn.textContent='生成中…';btn.disabled=true;try{const txt=await callAI([{role:'user',content:`为角色扮演生成简洁世界观。类型：「${c.worldType||'现代都市'}」，角色：${c.pKeywords||c.name}。250字内含地点时代氛围关键设定，直接输出正文。`}],model);c.worldview=txt;save();render();}catch(e){alert('生成失败：'+e.message);btn.textContent='🌍 AI 生成/补全世界观';btn.disabled=false;}}
function addContact(){const id='c'+Date.now();const c=blankChar(id);c._draft=true;DB.contacts.push(c);DB.chats[id]=[];save();editContact(id,'contacts');}
async function fetchModels(){const url=document.getElementById('apiUrl').value.trim().replace(/\/$/,'');const key=document.getElementById('apiKey').value.trim();if(!url||!key){alert('请先填 API地址 和 密钥');return;}try{const res=await fetch(url+'/models',{headers:{'Authorization':'Bearer '+key}});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();const list=(data.data||data.models||[]).map(m=>m.id||m.name).filter(Boolean);if(!list.length)throw new Error('没拉到模型');fillSelect('chatModel',list,DB.settings.chatModel);fillSelect('auxModel',list,DB.settings.auxModel);alert('成功拉取 '+list.length+' 个模型');}catch(e){alert('拉取失败：'+e.message+'\n\n地址：'+url+'\n\n【手机常见原因】\n1.地址开头是否 https（手机对http/混合内容更严格）\n2.UC浏览器可能拦截跨域，换Chrome/系统浏览器试试\n3.本地文件(file://)在部分手机浏览器无法发起请求');}}
function fillSelect(id,list,sel){document.getElementById(id).innerHTML=list.map(m=>`<option ${m===sel?'selected':''}>${m}</option>`).join('');}
function saveApi(){DB.settings.apiUrl=document.getElementById('apiUrl').value.trim().replace(/\/$/,'');DB.settings.apiKey=document.getElementById('apiKey').value.trim();const cm=document.getElementById('chatModel').value,am=document.getElementById('auxModel').value;if(cm&&!cm.includes('请先'))DB.settings.chatModel=cm;if(am&&!am.includes('润色'))DB.settings.auxModel=am;save();alert('已保存！');}

function exportCharacter(id){
  var c = getC(id);
  if (!c) { alert('角色不存在'); return; }
  var data = {
    character: {
      name: c.name,
      nick: c.nick,
      gender: c.gender,
      age: c.age,
      job: c.job,
      family: c.family,
      body: c.body,
      pLook: c.pLook,
      pKeywords: c.pKeywords,
      pStyle: c.pStyle,
      pBack: c.pBack,
      pDaily: c.pDaily,
      pLike: c.pLike,
      pLang: c.pLang,
      negative: c.negative,
      opening: c.opening,
      pExtra: c.pExtra,
      signature: c.signature || '',
      lineColor: c.lineColor || '',
      worldType: c.worldType || '',
      worldview: c.worldview || '',
      activity: c.activity || '中',
      myGender: c.myGender || '',
      myAge: c.myAge || '',
      myJob: c.myJob || '',
      myLook: c.myLook || '',
      myPersona: c.myPersona || '',
      myRelation: c.myRelation || '',
      status: c.status || {好感度:50, 信任度:50, 紧张感:0, 当前关系:'初次见面'},
      chapters: c.chapters || []
    },
    chats: (DB.chats[id] || []).map(function(m){
      return {
        role: m.role,
        content: m.content,
        type: m.type || 'text',
        time: m.time,
        amount: m.amount || undefined
      };
    })
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (c.nick || c.name) + '_备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importCharacter(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = function(e){
    var file = inp.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.character || !data.chats) {
          popTip('不是有效的角色备份文件', {icon:'⚠️', title:'导入失败'});
          return;
        }
        var c = data.character;
        var existing = DB.contacts.find(function(x){ return x.name === c.name && x.nick === c.nick; });
        if (existing) {
          popConfirm('已存在同名角色「'+(c.nick||c.name)+'」，是否覆盖？', function(){
            var id = existing.id;
            for (var key in c) { existing[key] = c[key]; }
            DB.chats[id] = data.chats || [];
            save();
            popTip('已覆盖角色「'+(c.nick||c.name)+'」', {icon:'✅', title:'导入成功'});
            renderContacts();
          }, {icon:'📥', title:'覆盖确认'});
          return;
        }
        var newId = 'c' + Date.now();
        var newChar = blankChar(newId);
        for (var key2 in c) { newChar[key2] = c[key2]; }
        if (!newChar.status) newChar.status = {好感度:50, 信任度:50, 紧张感:0, 当前关系:'初次见面'};
        if (!newChar.chapters) newChar.chapters = [];
        newChar.inChatList = true;
        DB.contacts.push(newChar);
        DB.chats[newId] = data.chats || [];
        save();
        popTip('已导入角色「'+(c.nick||c.name)+'」', {icon:'✅', title:'导入成功'});
        renderContacts();
      } catch(err) {
        popTip(err.message, {icon:'⚠️', title:'文件解析失败'});
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}
