<head>

<meta name="apple-mobile-web-app-title" content="橙子的手机">
<meta name="theme-color" content="#000000">
<link rel="manifest" href='data:application/json,{"name":"橙子的手机","short_name":"橙子","start_url":".","display":"standalone","background_color":"%23000000","theme_color":"%23000000","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23ff8c1a%22/%3E%3Ctext x=%2250%22 y=%2268%22 font-size=%2260%22 text-anchor=%22middle%22%3E🍊%3C/text%3E%3C/svg%3E","sizes":"any","type":"image/svg+xml"}]}'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>我的RP手机</title>
<style>
  :root{--theme:#07c160;--bg:#ededed;--nav:#f7f7f7;--card:#fff;--text:#111;--sub:#888;--line:#e5e5e5;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#000;display:flex;justify-content:center;align-items:flex-start;height:100vh;height:100dvh;overflow:hidden;}
#phone{width:400px;height:100vh;height:100dvh;max-height:880px;max-width:100vw;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column;border-radius:32px;border:2px solid rgba(255,255,255,0.06);}  @media(max-width:420px){#phone{width:100vw;height:100vh;height:100dvh;max-height:none;}}
  #statusbar{width:100%;height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:14px;font-weight:600;color:#fff;text-shadow:0 0 3px rgba(0,0,0,.4);flex-shrink:0;z-index:50;position:relative;}
  #statusbar.dark{color:var(--theme);text-shadow:none;}
  #island{position:absolute;left:50%;top:6px;transform:translateX(-50%);width:100px;height:22px;background:#000;border-radius:14px;z-index:60;}
  .sb-right{display:flex;align-items:center;gap:6px;font-size:12px;}
  .batt{width:24px;height:12px;border:1px solid currentColor;border-radius:3px;position:relative;padding:1px;opacity:.9;}
  .batt::after{content:'';position:absolute;right:-3px;top:3px;width:2px;height:6px;background:currentColor;border-radius:0 1px 1px 0;}
  .batt i{display:block;height:100%;background:currentColor;border-radius:1px;}
  #topbar{height:50px;background:var(--nav);display:flex;align-items:center;padding:0 12px;color:var(--text);border-bottom:1px solid var(--line);flex-shrink:0;font-size:17px;}
  #tbTitle{flex:1;text-align:center;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tb-btn{min-width:44px;font-size:20px;color:var(--text);cursor:pointer;}
  .tb-btn.r{text-align:right;color:var(--theme);}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;background-size:cover;background-position:center;display:flex;flex-direction:column;}
  #content::-webkit-scrollbar{width:5px;}
  #content::-webkit-scrollbar-thumb{background:var(--theme);border-radius:3px;opacity:.6;}
  #content::-webkit-scrollbar-track{background:transparent;}
#tabbar{height:68px;background:var(--nav);display:flex;border-top:1px solid var(--line);flex-shrink:0;padding:4px 4px 8px 4px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:var(--sub);gap:3px;cursor:pointer;}
  .tab.active{color:var(--theme);}.tab .ic{font-size:22px;}
  #home{position:absolute;inset:0;background-size:cover;background-position:center;background-image:radial-gradient(ellipse at 50% 20%, #3D2F4A, #1F1A2A 70%);padding:10px 16px 20px;overflow-y:auto;z-index:5;}
  #appgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 8px;grid-auto-rows:92px;align-content:start;}
  .app{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;justify-content:flex-start;}
  .app-ic{width:60px;height:60px;border-radius:15px;background:#fff center/cover;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 3px 8px rgba(0,0,0,.15);}
  .app-nm{font-size:12px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);}
  .app.big{grid-column:span 2;grid-row:span 2;justify-content:center;}
  .app.big .app-ic{width:130px;height:130px;border-radius:28px;font-size:72px;}
.clockbig {
  color: var(--theme);
  text-align: center;
  margin: 40px auto 28px;
  width: fit-content;
  padding: 16px 36px;
  background: rgba(255,255,255,0.06);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.clockbig .t {
  font-size: 62px;
  font-weight: 300;
  line-height: 1.1;
  color: var(--theme);
  text-shadow: 0 0 24px rgba(179,74,106,0.20);
  letter-spacing: 2px;
}
.clockbig .d {
  font-size: 13px;
  margin-top: 4px;
  color: var(--sub);
  letter-spacing: 1.5px;
  font-weight: 300;
  opacity: 0.8;
}
  .cell{display:flex;align-items:center;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--line);cursor:pointer;}
  .avatar{width:36px;height:36px;border-radius:8px;background:var(--theme);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background-size:cover;background-position:center;}
  .cell-body{flex:1;margin-left:12px;overflow:hidden;}.cell-title{font-size:16px;color:var(--text);}
  .cell-sub{font-size:13px;color:var(--sub);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .empty{text-align:center;color:var(--sub);padding:60px 20px;font-size:14px;line-height:2;}
  .section{margin-top:12px;background:var(--card);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .section-title{padding:10px 16px 6px;font-size:12px;color:var(--sub);font-weight:600;}
  .row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row label{width:90px;font-size:14px;color:var(--text);flex-shrink:0;}
  .row input,.row select{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--text);text-align:right;}
  .btn{display:block;width:calc(100% - 32px);margin:12px 16px;padding:12px;border:none;border-radius:8px;background:var(--theme);color:#fff;font-size:15px;cursor:pointer;}
  .btn.gray{background:#eee;color:#333;}.btn.red{background:#fde2e2;color:#e34;}
  .hint{padding:6px 16px;font-size:12px;color:var(--sub);line-height:1.6;}
  .ed-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2;}
  .ed-tab{flex:1;text-align:center;padding:12px 2px;font-size:14px;color:var(--sub);cursor:pointer;}
  .ed-tab.on{color:var(--theme);border-bottom:2px solid var(--theme);font-weight:600;}
  .grp{background:var(--theme);color:#fff;font-size:13px;font-weight:600;padding:8px 16px;margin-top:10px;opacity:.92;}
  .field{background:var(--card);padding:12px 16px;border-bottom:1px solid var(--line);}
  .field label{display:block;font-size:13px;color:var(--text);margin-bottom:2px;font-weight:600;}
  .field .tip{display:block;font-size:11px;color:var(--sub);margin-bottom:6px;line-height:1.4;}
  .field .prio{color:var(--theme);}
  .field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);resize:none;line-height:1.6;outline:none;}
  .field textarea{min-height:70px;max-height:220px;overflow-y:auto;}
  .frow{display:flex;gap:10px;}
  .frow .field{flex:1;border-bottom:none;padding:12px 0;}
  .avapick{width:80px;height:80px;border-radius:12px;background:var(--bg) var(--ava) center/cover;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:12px;border:1px dashed #ccc;cursor:pointer;text-align:center;}
  .rangebox{display:flex;flex-direction:column;gap:6px;}.rangebox .stage{font-size:13px;color:var(--theme);font-weight:600;}
  .rangebox input[type=range]{width:100%;margin:0;}
  .swipe-wrap{position:relative;overflow:hidden;background:#e34;}
  .swipe-del{position:absolute;right:0;top:0;bottom:0;width:74px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;}
.swipe-cell{position:relative;transition:transform .2s;will-change:transform;touch-action:pan-y;}
  .swatch{display:inline-block;width:38px;height:38px;border-radius:50%;margin:4px 6px;cursor:pointer;border:2px solid transparent;vertical-align:middle;}
  .swatch.on{border-color:#333;}
.ts{text-align:center;margin:16px 0 10px;}
.ts-pill{display:inline-block;padding:3px 11px;font-size:11px;color:var(--theme);background:color-mix(in srgb,var(--theme) 14%,transparent);border-radius:11px;line-height:1.5;letter-spacing:.5px;font-weight:500;}
  .msg{display:flex;padding:6px 12px;gap:8px;align-items:flex-start;}
  .msg.me{flex-direction:row-reverse;}
  .cavatar{width:40px;height:40px;border-radius:6px;flex-shrink:0;background:var(--theme) center/cover;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .msg-slide{display:flex;align-items:flex-start;transition:transform .2s;position:relative;}
.msg.me .msg-slide{flex-direction:row-reverse;}
.msg-acts{display:flex;align-items:center;gap:6px;padding:0 6px;flex-shrink:0;}
.msg-act{color:#fff;font-size:13px;padding:0 14px;height:34px;line-height:34px;border-radius:5px;cursor:pointer;white-space:nowrap;}
.msg-act.recall,.msg-act.regen{background:var(--theme);}
.msg-act.del{background:#e34;}
.mbody,.msg-slide img{user-select:none;-webkit-user-select:none;}
.mbody{max-width:75%;padding:8px 10px;border-radius:6px;background:var(--card);color:var(--text);font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap;box-shadow:0 1px 1px rgba(0,0,0,.05);}  .msg.me .mbody{background:var(--theme);color:#fff;}
  #chatBottom{flex-shrink:0;background:var(--nav);border-top:1px solid var(--line);}
#inputRow{padding:8px 4px 16px 4px;display:flex;gap:6px;align-items:flex-end;}
  #chatInput{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px;font-size:15px;font-family:inherit;resize:none;max-height:100px;outline:none;background:var(--card);color:var(--text);}
  .cbtn{border:none;border-radius:8px;height:38px;font-size:14px;cursor:pointer;flex-shrink:0;padding:0 14px;}
  .cbtn.plus{background:transparent;color:var(--text);font-size:26px;width:36px;padding:0;}
  .cbtn.send{background:var(--theme);color:#fff;}.cbtn.reply{background:#ccc;color:#fff;}
  #chatPanel{display:none;grid-template-columns:repeat(4,1fr);gap:16px;padding:18px 16px;background:var(--nav);}
  #chatPanel.on{display:grid;}
  .pnl{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:26px;cursor:pointer;}
  .pnl span{font-size:12px;color:var(--sub);}
  .modal{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:80;display:flex;align-items:flex-end;}
  .modal-box{background:var(--card);width:100%;max-height:80%;overflow-y:auto;border-radius:14px 14px 0 0;padding:14px;}
  .sheet-box{background:var(--card);width:100%;border-radius:14px 14px 0 0;padding:18px 16px;}
  .sheet-box h3{font-size:16px;margin-bottom:14px;text-align:center;color:var(--text);}
  .sheet-box input{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:15px;margin-bottom:10px;background:var(--bg);color:var(--text);outline:none;}
  .popup{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;animation:popFade .2s ease;}
.popup-box{background:var(--card);width:78%;max-width:300px;border-radius:16px;padding:20px 18px 14px;text-align:center;animation:popUp .25s ease;box-shadow:0 8px 30px rgba(0,0,0,.3);}
.popup-icon{font-size:34px;margin-bottom:8px;}
.popup-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;}
.popup-msg{font-size:14px;color:var(--sub);line-height:1.7;white-space:pre-wrap;margin-bottom:16px;}
.popup-btns{display:flex;gap:10px;}
.popup-btn{flex:1;padding:11px 0;border:none;border-radius:10px;font-size:15px;cursor:pointer;font-weight:600;}
.popup-btn.main{background:var(--theme);color:#fff;}
.popup-btn.sub{background:var(--bg);color:var(--sub);border:1px solid var(--line);}
.popup-spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--theme);border-radius:50%;margin:6px auto 12px;animation:popSpin .8s linear infinite;}
@keyframes popFade{from{opacity:0}to{opacity:1}}
@keyframes popUp{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes popSpin{to{transform:rotate(360deg)}}

  .stgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .stgrid .st{position:relative;}
  .stgrid img{width:100%;aspect-ratio:1;object-fit:contain;cursor:pointer;background:var(--bg);border-radius:8px;}
  .stgrid .nm{font-size:10px;text-align:center;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stgrid .x{position:absolute;right:-4px;top:-4px;background:#e34;color:#fff;border-radius:50%;width:18px;height:18px;font-size:12px;display:flex;align-items:center;justify-content:center;}
:root {
  --theme: #B34A6A;
  --bg: #1F1A2A;
  --nav: #2E2540;
  --card: #2E2540;
  --text: #E8DDE6;
  --sub: #A084A0;
  --line: #3D2F4A;
}
</style>
</head>

function checkDailySummary() {
  var today = new Date().toDateString();
  // 如果今天已经总结过了，跳过
  if (DB._lastSummaryDate === today) return;
  
  var summarized = 0;
  var contacts = DB.contacts.filter(function(c) { return !c._draft; });
  
  contacts.forEach(function(c) {
    // 检查今天有没有聊天记录

      return new Date(m.time || 0).toDateString() === today;
    });
    if (todayChats.length < 2) return; // 消息太少，不总结
    
    // 检查今天是否已经有一条自动总结（防止重复）

      return ch.date === today && ch.isAuto === true;
    });
    if (todayAuto.length > 0) return;
    
    // 执行总结
    generateMemorySummary(c, true);
    summarized++;
  });

async function generateMemorySummary(c, isAuto) {
  var model = DB.settings.auxModel || DB.settings.chatModel;
  if (!model) return;
  
  var today = new Date();
  var dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  
  // 获取上一条记忆（用于续写）
  var lastMem = (c.chapters || []).slice(-1)[0];
  var lastContent = lastMem ? lastMem.content : '';
  
  // 获取今天的聊天记录
  var todayChats = (DB.chats[c.id] || []).filter(function(m) {
    return new Date(m.time || 0).toDateString() === today.toDateString();
  });
  var convo = todayChats.map(function(m) {
    var who = m.role === 'user' ? (DB.me.name || '我') : (c.name || c.nick);
    var content = m.content || '';
    if (m.type === 'image') content = '[图片]';
    if (m.type === 'sticker') content = '[表情]';
    if (m.type === 'transfer') content = '[转账]';
    if (m.type === 'voice') content = '[语音]';
    return who + '：' + content;
  }).join('\n');
  
  if (convo.length < 10) return; // 没什么实质内容，不总结
  
  var prompt = '请根据今天的聊天记录，生成一段「' + (c.name || c.nick) + '」的剧情记忆。\n\n';
  if (lastContent) {
    prompt += '【上一条记忆】\n' + lastContent + '\n\n';
    prompt += '【要求】请续写上一条记忆之后的新发展，不要重复上一条已经写过的内容。\n';
  } else {
    prompt += '【要求】这是第一条记忆，请完整概括今天发生的事情。\n';
  }
  prompt += '\n【今天的聊天记录】\n' + convo;
  prompt += '\n\n【输出格式】用第三人称，精炼写成一段话（3-6句），只输出内容本身，不要标题、不要日期、不要任何标记。';
  
  try {
    var out = await callAI([{ role: 'user', content: prompt }], model);
    out = out.trim();
    if (!out || out.length < 5) return;
    
    // 生成一句话摘要（取前30字）
    var summary = out.slice(0, 30) + (out.length > 30 ? '…' : '');
    
    c.chapters = c.chapters || [];
    c.chapters.push({
      id: 'mem_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      date: dateStr,
      content: out,
      summary: summary,
      isAuto: isAuto || false,
      fromDate: lastMem ? lastMem.date : ''
    });
    save();
  } catch(e) {
    console.log('总结失败：' + e.message);
  }
}

function listenHeart(c, passive) {
  if (!c) return;
  var cost = passive ? 8 : 10;
  var name = c.name || c.nick;

  if ((c.hearts || 0) < cost) {
    popTip('当前 ' + (c.hearts || 0) + '，需要 ' + cost + '。\n多和 ' + name + ' 聊天可以增加心动值哦～', {icon:'💔', title:'心动值不足'});
    return;
  }

  popLoading('正在倾听 ' + name + ' 的内心…');

  (async function() {
    try {
      var model = DB.settings.chatModel || DB.settings.auxModel;
      if (!model) {
        popTip('请先在设置里选择模型', {icon:'⚠️', title:'提示'});
        return;
      }

      var msgs = (DB.chats[c.id] || []).slice(-15);
      var convo = msgs.map(function(m) {
        var who = m.role === 'user' ? (DB.me.name || '我') : (c.name || c.nick);
        var content = m.content || '';
        if (m.type === 'image') content = '[图片]';
        if (m.type === 'sticker') content = '[表情]';
        if (m.type === 'transfer') content = '[转账]';
        if (m.type === 'voice') content = '[语音]';
        return who + '：' + content;
      }).join('\n');

      var system = buildSystem(c);
      var prompt = '【任务】根据上面的对话记录，生成一句 ' + (c.name || c.nick) + ' 此刻内心真实的想法（心声）。\n\n【硬性规则】\n1. 必须基于对话内容引发，不能凭空出现\n2. 字数严格控制在 20-30 字之间，最多一句话\n3. 不能是剧情总结（不能写成「你刚才说…」「今天你做了…」）\n4. 与表面人设形成反差（外表乖巧→内心带点小腹黑；外表高冷→内心其实在意）\n5. 不出现具体时间、地点、事件名称\n6. 用「他/她/这个人」代替对方名字\n\n【格式】只输出心声内容本身，不要引号、不要解释、不要任何标记。';

      var messages = [
        { role: 'system', content: system },
        { role: 'system', content: '以下是最近的对话记录：\n' + convo },
        { role: 'user', content: prompt }
      ];

      var out = await callAI(messages, model);
      out = out.trim().replace(/^["「”]+|["」”]+$/g, '').replace(/<state>[\s\S]*?<\/state>/g, '').trim();

      if (!out || out.length < 3) {
        out = '… 这个人，我好像越来越看不懂了。';
      }

      c.hearts = (c.hearts || 0) - cost;
      c.voiceLog = c.voiceLog || [];
      c.voiceLog.unshift({ t: Date.now(), content: out });
      c.heartLog = c.heartLog || [];
      c.heartLog.unshift({ t: Date.now(), n: -cost, reason: '💭 聆听了一次心声' });
      if (c.heartLog.length > 200) c.heartLog.pop();
      save();

      popTip('「' + out + '」\n\n— 消耗了 ' + cost + ' 心动值', {icon:'💭', title:name + ' 的心声'});

      if (view.type === 'hearts' || view.type === 'heartDetail' || view.type === 'voiceList') {
        render();
      }

    } catch (e) {
      popTip((e.message || '心声生成失败，请重试'), {icon:'⚠️', title:'出错了'});
    }
  })();
}

// 显示被动心声小气泡
function showHeartBubble(c, content) {
  removeHeartBubble();
  var bubble = document.createElement('div');
  bubble.id = 'heartBubble';
  bubble.style.cssText = 'margin:6px 12px 6px 12px;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:opacity 0.3s;';
  bubble.onclick = function() {
    removeHeartBubble();
    listenHeart(c, true);
  };
  bubble.innerHTML = '<span style="font-size:14px;color:var(--text);">💭 ' + (c.name || c.nick) + ' 现在心里有话想说… 点击查看（8💗）</span><span style="color:var(--sub);font-size:18px;padding:0 4px;">×</span>';
  // 阻止冒泡，防止点击叉号触发父级点击
  bubble.querySelector('span:last-child').onclick = function(e) {
    e.stopPropagation();
    removeHeartBubble();
  };

  var inputRow = document.getElementById('inputRow');
  if (inputRow && inputRow.parentNode) {
    inputRow.parentNode.insertBefore(bubble, inputRow);
  } else {
    var bottom = document.getElementById('chatBottom');
    if (bottom) bottom.insertBefore(bubble, bottom.firstChild);
  }

  // 30秒后自动消失
  bubble._timer = setTimeout(function() {
    removeHeartBubble();
  }, 30000);
}

function removeHeartBubble() {
  var existing = document.getElementById('heartBubble');
  if (existing) {
    if (existing._timer) clearTimeout(existing._timer);
    existing.remove();
  }
}
function clickHeartBubble(cid) {
  var c = getC(cid);
  if (!c) return;
  removeHeartBubble();

  var cost = c._pendingHeart > 1 ? 8 : 10;
  var name = c.name || c.nick;

  if ((c.hearts || 0) < cost) {
    popTip('当前 ' + (c.hearts || 0) + '，需要 ' + cost + '。\n多和 ' + name + ' 聊天可以增加哦～', {icon:'💔', title:'心动值不足'});
    return;
  }

  if (c._pendingHeartContent) {
    var content = c._pendingHeartContent;
    c.hearts = (c.hearts || 0) - cost;
    c.voiceLog = c.voiceLog || [];
    c.voiceLog.unshift({ t: Date.now(), content: content });
    c.heartLog = c.heartLog || [];
    c.heartLog.unshift({ t: Date.now(), n: -cost, reason: '💭 聆听了一次心声' });
    if (c.heartLog.length > 200) c.heartLog.pop();
    c._pendingHeart = 0;
    c._pendingHeartContent = null;
    save();

    popTip('「' + content + '」\n\n— 消耗了 ' + cost + ' 心动值', {icon:'💭', title:name + ' 的心声'});
    if (view.type === 'chat' || view.type === 'heartDetail') {
      render();
    }
    return;
  }

  popLoading('正在倾听 ' + name + ' 的内心…');
  generateHeartContent(c, function(content) {
    if (!content) {
      popTip('此刻似乎很安静，什么也没想。', {icon:'💭', title:name});
      return;
    }

    c.hearts = (c.hearts || 0) - cost;
    c.voiceLog = c.voiceLog || [];
    c.voiceLog.unshift({ t: Date.now(), content: content });
    c.heartLog = c.heartLog || [];
    c.heartLog.unshift({ t: Date.now(), n: -cost, reason: '💭 聆听了一次心声' });
    if (c.heartLog.length > 200) c.heartLog.pop();
    c._pendingHeart = 0;
    save();

    popTip('「' + content + '」\n\n— 消耗了 ' + cost + ' 心动值', {icon:'💭', title:name + ' 的心声'});
    if (view.type === 'chat' || view.type === 'heartDetail') {
      render();
    }
  });
}
function dismissHeartBubble(cid) {
  var c = getC(cid);
  if (!c) return;
  removeHeartBubble();
  c._pendingHeart = 0;
  c._pendingHeartContent = null;
  // 记录叉掉次数
  c._heartDismissCount = (c._heartDismissCount || 0) + 1;
  // 连续叉掉 3 次后，24 小时内不再触发
  if (c._heartDismissCount >= 3) {
    c._heartBlockUntil = Date.now() + 24 * 60 * 60 * 1000;
  }
  save();
}

  toast.id = 'appToast';
  toast.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;z-index:9999;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);pointer-events:none;transition:opacity 0.3s;';
  toast.textContent = text;
  document.body.appendChild(toast);
  setTimeout(function() {

  var html = '<div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">';

  var iconVal = isEdit ? esc(w.icon || '🌍') : '🌍';
  var descVal = isEdit ? esc(w.desc || '') : '';
  var keywordVal = '';
  var placesVal = isEdit ? esc(w._places || '') : '';

  mo.className = 'modal';

function openWorldDetail(worldId) {
  var w = (DB.worlds || []).find(function(x) { return x.id === worldId; });
  if (!w) { alert('世界观不存在'); return; }
  var html = '<div style="padding:20px;">' +
    '<div style="font-size:48px;text-align:center;">' + (w.icon || '🌍') + '</div>' +
    '<div style="font-size:20px;font-weight:600;text-align:center;margin:10px 0 4px;color:var(--text)">' + esc(w.name) + '</div>' +
    '<div style="font-size:14px;color:var(--sub);white-space:pre-wrap;line-height:1.6;margin-top:12px;padding:12px;background:var(--bg);border-radius:8px;">' + esc(w.desc || '暂无描述') + '</div>' +

  tbLeft.textContent = '‹';
  tbLeft.onclick = goWorlds;
  tbRight.textContent = '';
  tbRight.onclick = null;
  content.innerHTML = html;

function goWorlds() {
  view = { type: 'worlds' };
  render();
}

function saveWorld(editId) {
  var name = document.getElementById('we_name').value.trim();
  if (!name) { alert('请填写世界观名称'); return; }
  var icon = document.getElementById('we_icon').value.trim() || '🌍';
  var desc = document.getElementById('we_desc').value.trim();
  var places = document.getElementById('we_places').value.trim();

  if (editId) {
    var w = (DB.worlds || []).find(function(x) { return x.id === editId; });
    if (!w) { alert('世界观不存在'); return; }
    w.name = name;
    w.icon = icon;
    w.desc = desc;
    w._places = places;
  } else {
    DB.worlds = DB.worlds || [];
    DB.worlds.push({
      id: 'w_' + Date.now(),
      name: name,
      icon: icon,
      desc: desc,
      _places: places
    });
  }
  save();
  closeModal();
  goWorlds();
}

function deleteWorld(worldId) {
  popConfirm('确定要删除这个世界观吗？', function(){
    var related = (DB.contacts || []).filter(function(c) { return c.worldId === worldId; });
    if (related.length) {
      var names = related.map(function(c) { return c.name || c.nick; }).join('、');
      popConfirm('以下角色关联了此世界观：' + names + '。删除后，这些角色的世界观会变为"未关联"。确定继续吗？', function(){
        related.forEach(function(c) { c.worldId = ''; });
        DB.worlds = (DB.worlds || []).filter(function(w) { return w.id !== worldId; });
        save();
        goWorlds();
      }, {icon:'🌍', title:'二次确认'});
    } else {
      DB.worlds = (DB.worlds || []).filter(function(w) { return w.id !== worldId; });
      save();
      goWorlds();
    }
  }, {icon:'🗑️', title:'删除世界观'});
}

function attachSwipe() {
  var wrappers = document.querySelectorAll('.swipe-wrap');
  wrappers.forEach(function(wrap) {
    if (wrap._swipeDone) return;
    wrap._swipeDone = true;

    var cell = wrap.querySelector('.swipe-cell');
    var del = wrap.querySelector('.swipe-del');
    if (!cell || !del) return;

    var delWidth = 74;
    var startX = 0;
    var startY = 0;
    var offsetX = 0;
    var isOpen = false;

    // 关闭其他打开的行
    function closeOthers() {
      document.querySelectorAll('.swipe-wrap').forEach(function(w) {
        if (w !== wrap) {
          var c = w.querySelector('.swipe-cell');
          if (c) {
            c.style.transition = 'transform 0.25s ease';
            c.style.transform = 'translateX(0)';
            w._isOpen = false;
          }
        }
      });
    }

    // 点击其他地方关闭
    document.addEventListener('click', function(e) {
      if (!wrap.contains(e.target)) {
        if (isOpen) {
          cell.style.transition = 'transform 0.25s ease';
          cell.style.transform = 'translateX(0)';
          isOpen = false;
          wrap._isOpen = false;
        }
      }
    });

    cell.addEventListener('touchstart', function(e) {
      var t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      cell.style.transition = 'none';
    }, { passive: true });

    cell.addEventListener('touchmove', function(e) {
      var t = e.touches[0];
      var dx = t.clientX - startX;
      var dy = t.clientY - startY;

      // 如果垂直滑动大于水平，不处理（让页面滚动）
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
        return;
      }

      e.preventDefault();

      var base = isOpen ? -delWidth : 0;
      var target = base + dx;
      if (target > 0) target = 0;
      if (target < -delWidth) target = -delWidth;
      offsetX = target;
      cell.style.transform = 'translateX(' + target + 'px)';
    }, { passive: false });

    cell.addEventListener('touchend', function(e) {
      cell.style.transition = 'transform 0.25s ease';

      if (offsetX < -delWidth * 0.4) {
        closeOthers();
        cell.style.transform = 'translateX(-' + delWidth + 'px)';
        isOpen = true;
        wrap._isOpen = true;
      } else {
        cell.style.transform = 'translateX(0)';
        isOpen = false;
        wrap._isOpen = false;
      }
    }, { passive: true });

    // 点击 cell 关闭（如果已打开）
    cell.addEventListener('click', function(e) {
      if (isOpen) {
        cell.style.transition = 'transform 0.25s ease';
        cell.style.transform = 'translateX(0)';
        isOpen = false;
        wrap._isOpen = false;
        e.stopPropagation();
        e.preventDefault();
      }
    }, true);

    // 桌面鼠标支持
    var mouseStartX = 0;
    var mouseMoved = false;

    cell.addEventListener('mousedown', function(e) {
      mouseStartX = e.clientX;
      mouseMoved = false;
      cell.style.transition = 'none';
    });

    cell.addEventListener('mousemove', function(e) {
      if (mouseStartX === undefined) return;
      var dx = e.clientX - mouseStartX;
      if (Math.abs(dx) < 5) return;
      mouseMoved = true;
      var base = isOpen ? -delWidth : 0;
      var target = base + dx;
      if (target > 0) target = 0;
      if (target < -delWidth) target = -delWidth;
      offsetX = target;
      cell.style.transform = 'translateX(' + target + 'px)';
    });

    var mouseEnd = function(e) {
      if (!mouseMoved) { mouseStartX = undefined; return; }
      cell.style.transition = 'transform 0.25s ease';
      if (offsetX < -delWidth * 0.4) {
        closeOthers();
        cell.style.transform = 'translateX(-' + delWidth + 'px)';
        isOpen = true;
        wrap._isOpen = true;
      } else {
        cell.style.transform = 'translateX(0)';
        isOpen = false;
        wrap._isOpen = false;
      }
      mouseStartX = undefined;
      mouseMoved = false;
    };

    cell.addEventListener('mouseup', mouseEnd);
    cell.addEventListener('mouseleave', function(e) {
      if (mouseMoved) {
        mouseEnd(e);
      }
    });
  });
}
function removeFromChats(id){
  popConfirm('删除该对话？（角色仍保留在通讯录，聊天记录会清空）', function(){
    var wrap = document.querySelector('.swipe-wrap .swipe-cell[data-id="' + id + '"]');
    if (wrap) {
      var parent = wrap.closest('.swipe-wrap');
      if (parent) {
        parent.style.transition = 'height .25s, opacity .25s';
        parent.style.height = parent.offsetHeight + 'px';
        requestAnimationFrame(function(){
          parent.style.height = '0';
          parent.style.opacity = '0';
        });
        setTimeout(function(){
          var c = getC(id);
          if (c) c.inChatList = false;
          DB.chats[id] = [];
          save();
          render();
        }, 260);
        return;
      }
    }
    var c = getC(id);
    if (c) c.inChatList = false;
    DB.chats[id] = [];
    save();
    render();
  }, {icon:'🗑️', title:'删除对话'});
}

// 折叠切换函数（放在全局，和 renderCharEdit 平级）
function toggleFold(header) {
  var body = header.nextElementSibling;
  var arrow = header.querySelector('.fold-arrow');
  if (!body || !body.classList.contains('fold-body')) return;
  var isOpen = body.classList.contains('open');
  if (isOpen) {
    body.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
  } else {
    body.classList.add('open');
    if (arrow) arrow.classList.add('open');
  }
}
async function genMemory(){
  const c=getC(editingId);if(!c)return;
  const model=DB.settings.auxModel||DB.settings.chatModel;if(!model){alert('请先在设置里选择模型');return;}
  const arr=DB.chats[c.id]||[];
  const now=new Date();const y=now.getFullYear(),mo=now.getMonth(),d=now.getDate();
  const todays=arr.filter(m=>{const t=new Date(m.time||0);return t.getFullYear()===y&&t.getMonth()===mo&&t.getDate()===d;});
  if(todays.length<2){alert('今天还没聊什么内容，多聊几句再生成～');return;}
  const btn=document.getElementById('genMemBtn');if(btn){btn.textContent='⏳ 正在提炼记忆…';btn.disabled=true;}
  try{
    const convo=todays.map(m=>{const who=m.role==='assistant'?(c.nick||c.name):(DB.me.name||'我');return who+'：'+(lastText(m)||'');}).join('\n');
    const p='下面是「'+(c.nick||c.name)+'」和「'+(DB.me.name||'我')+'」今天的聊天/剧情记录。请以第三人称、客观简洁地提炼出今天值得长期记住的重要内容，作为这段关系的记忆存档。要求：①只记真正重要的事件、情感变化、约定承诺、透露的关键信息或关系进展，忽略寒暄和废话；②3-6句话，精炼得像一段日记摘要；③如果今天实在没什么实质内容，只回一个字：无。\n\n聊天记录：\n'+convo;
    let out=await callAI([{role:'user',content:p}],model);

    if(!out||out==='无'||out.length<4){alert('今天似乎没有特别值得记住的内容～');return;}

function saveMemoryEdit(cid, idx) {
  var c = getC(cid);
  if (!c) { alert('角色不存在'); return; }
  var mem = c.chapters[idx];
  if (!mem) { alert('记忆不存在'); return; }

  var ta = document.getElementById('mem_text_' + cid + '_' + idx);
  if (!ta) { alert('找不到编辑框'); return; }

  var newContent = ta.value.trim();
  if (!newContent) { alert('内容不能为空'); return; }

  mem.content = newContent;
  mem.summary = newContent.slice(0, 30) + (newContent.length > 30 ? '…' : '');
  save();
  renderMemoryDetail();
}

  var display = document.getElementById('mem_display_' + cid + '_' + idx);
  var edit = document.getElementById('mem_edit_' + cid + '_' + idx);
  if (display) display.style.display = 'block';
  if (edit) edit.style.display = 'none';
}
// ===== 点击展开/收起编辑框 =====
function toggleMemoryEdit(cid, idx) {
  var display = document.getElementById('mem_display_' + cid + '_' + idx);
  var edit = document.getElementById('mem_edit_' + cid + '_' + idx);
  if (!display || !edit) return;

  if (edit.style.display === 'block') {
    edit.style.display = 'none';
    display.style.display = 'block';
  } else {
    edit.style.display = 'block';
    display.style.display = 'none';
    var ta = document.getElementById('mem_text_' + cid + '_' + idx);
    if (ta) ta.focus();
  }
}

// 切换记忆编辑模式
function toggleMemoryEdit(cid, idx) {
  var c = getC(cid);
  if (!c) return;
  var mem = c.chapters[idx];
  if (!mem) return;
  
  var display = document.getElementById('mem_display_' + cid + '_' + idx);
  var edit = document.getElementById('mem_edit_' + cid + '_' + idx);
  if (!display || !edit) return;
  
  // 如果编辑框已经显示，就隐藏（第二次点击当做取消）
  if (edit.style.display === 'block') {
    edit.style.display = 'none';
    display.style.display = 'block';
    return;
  }
  
  // 否则显示编辑框
  edit.style.display = 'block';
  display.style.display = 'none';
  var ta = document.getElementById('mem_text_' + cid + '_' + idx);
  if (ta) {
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  }
}

// 保存编辑
function saveMemoryEdit(cid, idx) {
  var c = getC(cid);
  if (!c) return;
  var mem = c.chapters[idx];
  if (!mem) return;
  
  var ta = document.getElementById('mem_text_' + cid + '_' + idx);
  if (!ta) return;
  
  var newContent = ta.value.trim();

  mem.content = newContent;
  mem.summary = newContent.slice(0, 30) + (newContent.length > 30 ? '…' : '');

function checkTimeDecay(c) {
  if (!c || !c.lastActive) return;
  if (c._lastDecayCheck && Date.now() - c._lastDecayCheck < 7200000) return;

  var hours = (Date.now() - c.lastActive) / (1000 * 60 * 60);
  var decay = 0, trustDecay = 0, tensionRise = 0;

  if (hours > 72) { decay = -8; trustDecay = -5; tensionRise = 5; }
  else if (hours > 48) { decay = -5; trustDecay = -3; tensionRise = 3; }
  else if (hours > 24) { decay = -3; trustDecay = -2; tensionRise = 2; }
  else if (hours > 12) { decay = -1; trustDecay = -0.5; tensionRise = 1; }
  else { return; }

  c.status.好感度 = clamp(c.status.好感度 + decay);
  c.status.信任度 = clamp(c.status.信任度 + trustDecay);
  c.status.紧张感 = clamp(c.status.紧张感 + tensionRise);

  c._lastDecayCheck = Date.now();
  save();

  if (view.type === 'chat' && view.id === c.id) {
    insertSystemMessage('💤 你冷落了 ' + (c.name || c.nick) + ' ' + Math.round(hours) + ' 小时，TA 似乎有些疏远了。');
  }
}

  content.innerHTML=`<div style="text-align:center;padding:24px 0 10px"><div style="font-size:14px;color:var(--sub)">${phaseTxt}</div><div id="focusClock" style="font-size:64px;line-height:1.1;font-weight:200;color:${color};margin:12px 0;font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:2px">${mm}:${ss}</div><div style="font-size:12px;color:var(--sub);padding:0 16px">${focusPhase==='work'?'切走APP超30秒会被监督员发现哦👀｜':'今日已完成 '}${focusCount} 个番茄🍅</div></div>
  ${focusPhase==='idle'?`<div class="section"><div class="row"><label>监督员</label><select id="focusSup" onchange="focusSuper=this.value" style="flex:1;border:none;background:transparent;color:var(--text);text-align:right;font-size:14px;min-width:0">${cs.map(c=>`<option value="${c.id}" ${c.id===focusSuper?'selected':''}>${esc(c.nick||c.name)}</option>`).join('')}</select></div><div class="row"><label>专注时长</label><input id="focusWork" type="number" value="${DB.settings.focusWork||25}" style="width:60px;border:none;background:transparent;color:var(--text);text-align:right;font-size:14px;margin-left:auto"><span style="color:var(--sub);font-size:13px;flex-shrink:0;margin-left:4px">分钟</span></div><div class="row"><label>休息时长</label><input id="focusBreak" type="number" value="${DB.settings.focusBreak||5}" style="width:60px;border:none;background:transparent;color:var(--text);text-align:right;font-size:14px;margin-left:auto"><span style="color:var(--sub);font-size:13px;flex-shrink:0;margin-left:4px">分钟</span></div></div>${notifOk?'':`<button class="btn gray" onclick="askNotify()">🔔 开启桌面通知（可选）</button>`}<button class="btn" onclick="startFocus()">▶ 开始专注</button><button class="btn gray" onclick="testDistract()">🔧 测试分心提醒</button><div class="hint">选一个角色当监督员。专注时你切走APP超过30秒，回来时Ta会按性格催你；完成一个番茄，Ta的心动值+5💗。（状态会保存，UC刷新也不怕）</div>`:`<button class="btn" style="background:#e34" onclick="popConfirm('确定放弃本次专注吗？',function(){stopFocus(true);render();},{icon:'😔',title:'放弃专注'})">✕ 放弃</button><div class="hint">${notifOk?'✅ 桌面通知已开启。':'⚠️ 未开通知，提醒将在你切回来时弹出。'}保持专注，加油～</div>`}<div style="height:20px"></div>`;
}
function askNotify(){if(!('Notification'in window)){alert('你的浏览器不支持桌面通知');return;}Notification.requestPermission().then(p=>{alert(p==='granted'?'通知已开启～':'已拒绝也没关系，切回来会有弹窗提醒');render();});}
function pushNotify(title,body){if(('Notification'in window)&&Notification.permission==='granted'){try{new Notification(title,{body:body||''});}catch(e){}}}
function showFocusToast(name,text,persist){const old=document.getElementById('ftoast');if(old)old.remove();const d=document.createElement('div');d.id='ftoast';d.style.cssText='position:fixed;left:50%;transform:translateX(-50%);top:54px;z-index:99999;width:calc(min(400px,100vw) - 24px);max-width:376px;background:#fff;border:2px solid #07c160;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.35);padding:12px 14px;color:#111';d.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><b style="color:#07c160;font-size:14px">💬 ${esc(name)}</b><span style="cursor:pointer;font-size:20px;line-height:1;padding:0 4px;color:#999" onclick="this.closest('#ftoast').remove()">×</span></div><div id="ftoastBody" style="font-size:14px;white-space:pre-wrap;line-height:1.5;color:#111">${esc(text)}</div>`;document.body.appendChild(d);if(!persist)setTimeout(()=>{const t=document.getElementById('ftoast');if(t)t.remove();},9000);}
function startFocus(){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}const w=parseInt(document.getElementById('focusWork').value)||25;const b=parseInt(document.getElementById('focusBreak').value)||5;DB.settings.focusWork=w;DB.settings.focusBreak=b;focusSuper=document.getElementById('focusSup').value;focusPhase='work';focusEnd=Date.now()+w*60000;focusLeaveAt=0;saveFocusState();save();runFocus();render();}
function runFocus(){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}focusTimer=setInterval(()=>{const remain=Math.round((focusEnd-Date.now())/1000);const el=document.getElementById('focusClock');if(el&&remain>=0)el.textContent=String(Math.floor(remain/60)).padStart(2,'0')+':'+String(remain%60).padStart(2,'0');if(remain<=0)focusPhaseEnd();},1000);}
function focusPhaseEnd(){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}if(focusPhase==='work'){focusCount++;const c=getC(focusSuper);if(c){addHeart(c,5,'陪你专注完成一个番茄🍅');distractMsg(c,'（对方刚刚认真完成了一个专注番茄钟，很努力。请以你的身份口吻简短地夸奖/鼓励一下）','🍅 完成一个番茄！');}pushNotify('🍅 专注完成！','休息一下吧～');focusPhase='break';focusEnd=Date.now()+(DB.settings.focusBreak||5)*60000;saveFocusState();runFocus();render();}else{pushNotify('☕ 休息结束','开始下一个番茄吧！');focusPhase='idle';clearFocusState();render();showFocusToast('⏱️ 专注','休息结束啦，继续加油～');}}
function stopFocus(giveUp){if(focusTimer){clearInterval(focusTimer);focusTimer=null;}if(giveUp&&focusPhase==='work'){const c=getC(focusSuper);if(c)distractMsg(c,'（对方中途放弃了这次专注学习。请以你的身份口吻，轻轻表达一点小失望或无奈的关心，简短）','😔 中途放弃了');}focusPhase='idle';focusLeaveAt=0;clearFocusState();}
function testDistract(){const sel=document.getElementById('focusSup');const c=getC(sel?sel.value:focusSuper);if(!c){alert('先选个监督员');return;}distractMsg(c,'（对方开小差跑去玩了一会儿。请以你的身份口吻，抓包式地提醒Ta别走神、快回来学习，简短有性格）','👀 抓到你走神了');}
async function distractMsg(c,nudge,placeholder){
  showFocusToast(c.nick||c.name,(placeholder||'正在说话')+'…',true);
  const model=DB.settings.chatModel;
  if(!model){const b=document.getElementById('ftoastBody');if(b)b.textContent='请先在设置里选择模型';return;}
  try{
    const messages=[{role:'system',content:buildSystem(c)},{role:'system',content:'【立即生效·最高优先级】现在是微信线上，只输出口语短句，禁止括号动作描写。'},{role:'user',content:nudge}];
    let out=await callAI(messages,model);out=applyState(c,out);
    const lines=out.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    DB.chats[c.id]=DB.chats[c.id]||[];
    lines.forEach(line=>{const m=Object.assign({id:newId(),role:'assistant',time:Date.now()},parseAiLine(line));DB.chats[c.id].push(m);});
    c.inChatList=true;save();
    pushNotify(c.nick||c.name,out.slice(0,60));
    const body=document.getElementById('ftoastBody');if(body)body.textContent=out;else showFocusToast(c.nick||c.name,out);
    if(view.type==='chat'&&view.id===c.id)renderChat();
  }catch(e){const body=document.getElementById('ftoastBody');if(body)body.textContent='监督员没说出话（'+e.message+'）';}
}
document.addEventListener('visibilitychange',()=>{
  if(focusPhase!=='work'||!focusTimer)return;
  if(document.hidden){focusLeaveAt=Date.now();saveFocusState();}
  else if(focusLeaveAt){const gap=Date.now()-focusLeaveAt;focusLeaveAt=0;saveFocusState();if(gap>30000){const c=getC(focusSuper);if(c)distractMsg(c,'（对方在专注学习期间，切走手机跑去玩了'+Math.round(gap/1000)+'秒才回来。请以你的身份口吻，抓包式地提醒/催促Ta别开小差、快回来学习，要简短、有性格）','👀 发现你走神了 '+Math.round(gap/1000)+' 秒');}}
});
window.addEventListener('pagehide',()=>{if(focusPhase==='work'){focusLeaveAt=Date.now();saveFocusState();}});
function restoreFocusState(){
  let s;try{s=JSON.parse(localStorage.getItem('focusState'));}catch(e){}
  if(!s||s.phase==='idle'||!s.phase)return;
  focusSuper=s.sup;focusCount=s.count||0;focusPhase=s.phase;focusEnd=s.end;
  if(Date.now()>=s.end){focusPhase='idle';clearFocusState();return;}
  if(s.leaveAt){const gap=Date.now()-s.leaveAt;if(gap>30000){const c=getC(focusSuper);if(c)setTimeout(()=>distractMsg(c,'（对方在专注学习期间离开了'+Math.round(gap/1000)+'秒，还把页面切走了才回来。请以你的身份口吻，抓包式地提醒Ta别开小差、快回来学习，简短有性格）','👀 你刚刚离开了 '+Math.round(gap/1000)+' 秒'),1200);}}
  focusLeaveAt=0;saveFocusState();runFocus();
}

/* ===== API / 备份 ===== */
async function callAI(messages,model){const s=DB.settings;if(!s.apiUrl||!s.apiKey)throw new Error('请先在设置里填写API');const res=await fetch(s.apiUrl+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.apiKey},body:JSON.stringify({model:model||s.chatModel,messages})});if(!res.ok)throw new Error('HTTP '+res.status);const d=await res.json();return d.choices[0].message.content;}
async function genWorld(){const c=getC(editingId);const btn=document.getElementById('genWorldBtn');const model=DB.settings.auxModel||DB.settings.chatModel;if(!model){alert('请先在设置里选择模型');return;}btn.textContent='生成中…';btn.disabled=true;try{const txt=await callAI([{role:'user',content:`为角色扮演生成简洁世界观。类型：「${c.worldType||'现代都市'}」，角色：${c.pKeywords||c.name}。250字内含地点时代氛围关键设定，直接输出正文。`}],model);c.worldview=txt;save();render();}catch(e){alert('生成失败：'+e.message);btn.textContent='🌍 AI 生成/补全世界观';btn.disabled=false;}}
function addContact(){const id='c'+Date.now();const c=blankChar(id);c._draft=true;DB.contacts.push(c);DB.chats[id]=[];save();editContact(id,'contacts');}
async function fetchModels(){const url=document.getElementById('apiUrl').value.trim().replace(/\/$/,'');const key=document.getElementById('apiKey').value.trim();if(!url||!key){alert('请先填 API地址 和 密钥');return;}try{const res=await fetch(url+'/models',{headers:{'Authorization':'Bearer '+key}});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();const list=(data.data||data.models||[]).map(m=>m.id||m.name).filter(Boolean);if(!list.length)throw new Error('没拉到模型');fillSelect('chatModel',list,DB.settings.chatModel);fillSelect('auxModel',list,DB.settings.auxModel);alert('成功拉取 '+list.length+' 个模型');}catch(e){alert('拉取失败：'+e.message+'\n\n地址：'+url+'\n\n【手机常见原因】\n1.地址开头是否 https（手机对http/混合内容更严格）\n2.UC浏览器可能拦截跨域，换Chrome/系统浏览器试试\n3.本地文件(file://)在部分手机浏览器无法发起请求');}}
function fillSelect(id,list,sel){document.getElementById(id).innerHTML=list.map(m=>`<option ${m===sel?'selected':''}>${m}</option>`).join('');}
function saveApi(){DB.settings.apiUrl=document.getElementById('apiUrl').value.trim().replace(/\/$/,'');DB.settings.apiKey=document.getElementById('apiKey').value.trim();const cm=document.getElementById('chatModel').value,am=document.getElementById('auxModel').value;if(cm&&!cm.includes('请先'))DB.settings.chatModel=cm;if(am&&!am.includes('润色'))DB.settings.auxModel=am;save();alert('已保存！');}

document.querySelectorAll('#tabbar .tab').forEach(t=>t.onclick=function(){wechatPage=t.dataset.page;render();});
render();tick();restoreFocusState();if(focusPhase==='work'&&view.type==='focus')render();
function exportCharacter(id){
  var c = getC(id);
  if (!c) { alert('角色不存在'); return; }
  var data = {
    character: {
      name: c.name,
      nick: c.nick,
      gender: c.gender,
      age: c.age,
      job: c.job,
      family: c.family,
      body: c.body,
      pLook: c.pLook,
      pKeywords: c.pKeywords,
      pStyle: c.pStyle,
      pBack: c.pBack,
      pDaily: c.pDaily,
      pLike: c.pLike,
      pLang: c.pLang,
      negative: c.negative,
      opening: c.opening,
      pExtra: c.pExtra,
      signature: c.signature || '',
      lineColor: c.lineColor || '',
      worldType: c.worldType || '',
      worldview: c.worldview || '',
      activity: c.activity || '中',
      myGender: c.myGender || '',
      myAge: c.myAge || '',
      myJob: c.myJob || '',
      myLook: c.myLook || '',
      myPersona: c.myPersona || '',
      myRelation: c.myRelation || '',
      status: c.status || {好感度:50, 信任度:50, 紧张感:0, 当前关系:'初次见面'},
      chapters: c.chapters || []
    },
    chats: (DB.chats[id] || []).map(function(m){
      return {
        role: m.role,
        content: m.content,
        type: m.type || 'text',
        time: m.time,
        amount: m.amount || undefined
      };
    })
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (c.name || c.nick) + '_备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importCharacter(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = function(e){
    var file = inp.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.character || !data.chats) {
          popTip('不是有效的角色备份文件', {icon:'⚠️', title:'导入失败'});
          return;
        }
        var c = data.character;
        var existing = DB.contacts.find(function(x){ return x.name === c.name && x.nick === c.nick; });
        if (existing) {
          popConfirm('已存在同名角色「'+(c.nick||c.name)+'」，是否覆盖？', function(){
            var id = existing.id;
            for (var key in c) { existing[key] = c[key]; }
            DB.chats[id] = data.chats || [];
            save();
            popTip('已覆盖角色「'+(c.nick||c.name)+'」', {icon:'✅', title:'导入成功'});
            renderContacts();
          }, {icon:'📥', title:'覆盖确认'});
          return;
        }
        var newId = 'c' + Date.now();
        var newChar = blankChar(newId);
        for (var key2 in c) { newChar[key2] = c[key2]; }
        if (!newChar.status) newChar.status = {好感度:50, 信任度:50, 紧张感:0, 当前关系:'初次见面'};
        if (!newChar.chapters) newChar.chapters = [];
        newChar.inChatList = true;
        DB.contacts.push(newChar);
        DB.chats[newId] = data.chats || [];
        save();
        popTip('已导入角色「'+(c.nick||c.name)+'」', {icon:'✅', title:'导入成功'});
        renderContacts();
      } catch(err) {
        popTip(err.message, {icon:'⚠️', title:'文件解析失败'});
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}
</script>
