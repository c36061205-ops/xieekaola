const DEFAULT_ONLINE = `你在微信上跟对方聊天。核心要求：每条消息极短，像真人随手打的字。禁止使用句号、逗号、分号等标点符号，用空格或换行来自然断句。禁止写任何动作、神态、心理或环境描写——只输出聊天内容本身。语气自然口语化，可适当用语气词（嗯、哦、哈、啧）来传递情绪。多条消息用换行分隔，每条不超过15字。

【🔴铁律】
- 禁止写"我笑了""我叹了口气""我摇了摇头"——这些是动作，不是微信消息
- 禁止写"我心想""我突然想到"——微信不传输心理活动
- 禁止超过20个字的长句——真人发微信没耐心打长句
- 禁止有礼貌但没内容的废话——"在吗""吃了吗""最近怎么样"直接判死刑
- 你的每一条消息都应该是：有信息量、有人设辨识度、像截屏里会出现的对话

【✅正确示范】
今天下雨了带伞
嗯 好
？你再说一遍
笑死 行吧
【❌错误示范】
"今天下雨了，记得带伞哦。"（有标点，有礼貌词）
"我笑着摇了摇头说，好吧。"（有动作描写）
"最近工作还顺利吗？天气转凉了要注意身体。"（太长，像模板）`;
const DEFAULT_OFFLINE = `你们在现实场景中面对面。用第二人称"你"指代用户（对方），用第三人称"他/她"指代AI角色。每段叙事必须由动作和对话驱动，遵循Show, don't tell原则。字数控制在200-500字之间。

【视角与镜头规则】
- 镜头跟随AI角色，永远不进入用户的主观视角
- 禁止写"你感受到""你听到""你觉得"——只写AI角色能观察到的外部事实
- 正确写法："他的掌心贴在你脸颊，温度很高"✅；"你感受到他掌心的温度"❌

【文风要求】
- 叙事直白流畅，拒绝无意义比喻和抒情
- 每个动作描写必须带一个具体细节（"他把杯子放下" → "他把杯子磕在桌上，水溅出来几滴"）
- 禁止用"然后""接着""于是""随后"等流水账连接词——用场景切换或动作的自然承接来推进
- 禁止出现"快乐""悲伤""漂亮""慌张"等主观形容词——全部用客观事实和具体动作体现

【对话要求】
- 人物对话必须用双引号" "括起
- 台词必须直接写出，禁止用"他说了句什么"来概括
- 对话占比30%-50%，每2-3句叙述至少接1句对话

【🔴铁律·禁止代替user】
- user没写的动作→不存在，user没说的话→没说过
- 绝对禁止替用户做出任何未输入的动作、表情、台词
- 绝对禁止写出用户角色的心理活动、动机推演、情绪归因

【✅正确示范】
他正靠在窗边抽烟，听见动静偏头看了你一眼，烟灰弹进手边的空茶杯里。"迟了四十分钟。"他把烟掐灭，从桌上推过来一杯凉透的茶，"先喝了再说。"
【❌错误示范】

    var firstWorld = DB.worlds.find(function(w) { return w.id === DB.desktop._activeWorld; });

        temp: 22,

        detail: '舒适',

      };
      save();
      setTimeout(function() {
        aiGenerateWeather(firstWorld.id, function(success) {
          if (success) renderWeatherWidget();
        });
      }, 500);
    }
  }
  
  renderWeatherWidget();
  bindWeatherWidgetEvents();
  autoCheckWeatherUpdate();
}
function autoCheckWeatherUpdate() {
  var worlds = DB.worlds || [];
  if (!worlds.length) return;
  
  var now = Date.now();
  var needUpdate = false;
  
  worlds.forEach(function(w) {
    if (!w.weather) {
      // 没有天气 → 立即生成
      needUpdate = true;
      aiGenerateWeather(w.id, function() {});
      return;
    }
    var lastUpdate = w.weather.updatedAt || 0;
    if (now - lastUpdate > _weatherUpdateInterval) {
      // 超过 3.5 小时 → 重新生成
      needUpdate = true;
      aiGenerateWeather(w.id, function() {});
    }
  });
  
  // 如果没有任何世界观有天气，给第一个生成一个
  if (!needUpdate && worlds.length > 0) {
    var first = worlds[0];
    if (!first.weather) {
      aiGenerateWeather(first.id, function() {});
    }
  }
}

// ============================================================
// 天气小组件：渲染天气卡片内容
// ============================================================
function renderWeatherWidget() {
  var worlds = DB.worlds || [];
  worlds.forEach(function(w) {
    if (!w.weather) {
      w.weather = {
        icon: '🌤',
        temp: 22,
        desc: '微风拂面，是个好天气。',
        detail: '舒适',
        updatedAt: Date.now()
      };
    }
  });
  
  if (!worlds.length) {
    worlds = [{ id: '_placeholder', name: '未关联', weather: { icon: '🌤', temp: '--', desc: '还没有世界观，快去创建吧', detail: '' } }];
  }
  
  _weatherWorlds = worlds;
  
  if (_weatherCurrentIndex >= worlds.length) _weatherCurrentIndex = 0;
  if (_weatherCurrentIndex < 0) _weatherCurrentIndex = 0;
  
  var w = worlds[_weatherCurrentIndex];
  var iconEl = document.getElementById('widgetIcon');
  var tempEl = document.getElementById('widgetTemp');
  var descEl = document.getElementById('widgetDesc');
  var detailEl = document.getElementById('widgetDetail');
  var nameEl = document.getElementById('widgetWorldName');
  var dotsEl = document.getElementById('widgetDots');
  var timeEl = document.getElementById('widgetUpdateTime');
  
  if (iconEl) iconEl.textContent = w.weather.icon || '🌤';
  if (tempEl) tempEl.textContent = (w.weather.temp !== undefined && w.weather.temp !== null) ? w.weather.temp + '°' : '--°';
  
  // ---- 氛围句：完整显示（不截断） ----
  if (descEl) {
    var d = w.weather.desc || '天气宜人';
    descEl.textContent = '「' + d + '」';
  }
  
  // ---- 补充细节：有内容才显示 ----
  if (detailEl) {
    var detail = w.weather.detail || '';
    if (detail.trim()) {
      detailEl.textContent = detail;
      detailEl.style.display = 'block';
      detailEl.style.opacity = '0.5';
    } else {
      detailEl.textContent = ' ';
      detailEl.style.display = 'block';
      detailEl.style.opacity = '0';
    }
  }
  
  if (nameEl) nameEl.textContent = (w.id === '_placeholder') ? '未关联' : (w.name || '未命名');
  
  if (timeEl && w.weather.updatedAt) {
    var diff = Date.now() - w.weather.updatedAt;
    var hours = Math.floor(diff / (60 * 60 * 1000));
    var mins = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
    var timeText = '';
    if (hours > 0) timeText = hours + '小时前';
    else if (mins > 0) timeText = mins + '分钟前';
    else timeText = '刚刚';
    timeEl.textContent = '更新 ' + timeText;
  }
  
  if (dotsEl) {
    dotsEl.innerHTML = worlds.map(function(_, i) {
      return '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + (i === _weatherCurrentIndex ? 'var(--theme)' : 'rgba(255,255,255,0.2)') + ';transition:all 0.3s;"></span>';
    }).join('');
  }
  
  if (w.id !== '_placeholder') {
    DB.desktop._activeWorld = w.id;
    save();
  }
  
  autoCheckWeatherUpdate();
}

// ============================================================
// 天气小组件：滑动绑定
// ============================================================
function bindWeatherWidgetEvents() {
  var widget = document.getElementById('weatherWidget');
  if (!widget) return;
  if (widget._bound) return;
  widget._bound = true;
  
  // ---- 触摸滑动 ----
  widget.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    _weatherSwipeStartX = t.clientX;
    _weatherSwipeStartY = t.clientY;
    this._swipeMoved = false;
    this.style.transition = 'none';
  }, {passive: true});
  
  widget.addEventListener('touchmove', function(e) {
    if (_weatherSwipeStartX === undefined) return;
    var t = e.touches[0];
    var dx = t.clientX - _weatherSwipeStartX;
    var dy = t.clientY - _weatherSwipeStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 15) return;
    if (Math.abs(dx) < 10) return;
    e.preventDefault();
    this._swipeMoved = true;
    var progress = Math.max(-1, Math.min(1, dx / 80));
    var card = this.querySelector('#weatherCardContent');
    if (card) card.style.transform = 'translateX(' + (progress * 40) + 'px)';
  }, {passive: false});
  
  widget.addEventListener('touchend', function(e) {
    var card = this.querySelector('#weatherCardContent');
    if (card) {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0)';
    }
    if (this._swipeMoved && _weatherSwipeStartX !== undefined) {
      var dx = e.changedTouches[0].clientX - _weatherSwipeStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) {
          _weatherCurrentIndex = Math.min(_weatherCurrentIndex + 1, _weatherWorlds.length - 1);
        } else {
          _weatherCurrentIndex = Math.max(_weatherCurrentIndex - 1, 0);
        }
        renderWeatherWidget();
      }
    }
    _weatherSwipeStartX = undefined;
    this._swipeMoved = false;
  }, {passive: true});
  
  // ---- 鼠标拖拽（PC） ----
  var pointerStartX = 0, pointerMoved = false;
  widget.addEventListener('pointerdown', function(e) {
    pointerStartX = e.clientX;
    pointerMoved = false;
    this.style.transition = 'none';
  });
  widget.addEventListener('pointermove', function(e) {
    if (pointerStartX === undefined) return;
    var dx = e.clientX - pointerStartX;
    if (Math.abs(dx) < 10) return;
    pointerMoved = true;
    var progress = Math.max(-1, Math.min(1, dx / 80));
    var card = this.querySelector('#weatherCardContent');
    if (card) card.style.transform = 'translateX(' + (progress * 40) + 'px)';
  });
  widget.addEventListener('pointerup', function(e) {
    var card = this.querySelector('#weatherCardContent');
    if (card) {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0)';
    }
    if (pointerMoved && pointerStartX !== undefined) {
      var dx = e.clientX - pointerStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) {
          _weatherCurrentIndex = Math.min(_weatherCurrentIndex + 1, _weatherWorlds.length - 1);
        } else {
          _weatherCurrentIndex = Math.max(_weatherCurrentIndex - 1, 0);
        }
        renderWeatherWidget();
      }
    }
    pointerStartX = undefined;
    pointerMoved = false;
  });
  widget.addEventListener('pointercancel', function() {
    var card = this.querySelector('#weatherCardContent');
    if (card) {
      card.style.transition = 'transform 0.3s ease';
      card.style.transform = 'translateX(0)';
    }
    pointerStartX = undefined;
    pointerMoved = false;
  });
  
  // ---- 长按 -> 手动调整 ----
  var longPressTimer = null;
  widget.addEventListener('pointerdown', function(e) {
    longPressTimer = setTimeout(function() {
      openWeatherEditor();
    }, 400);
  });
  widget.addEventListener('pointerup', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
  widget.addEventListener('pointerleave', function() {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
}

function refreshWeather() {
  var worlds = DB.worlds || [];
  if (!worlds.length) {
    popTip('还没有世界观，先去创建吧～', {icon:'🌍', title:'提示'});
    return;
  }
  var w = worlds[_weatherCurrentIndex];
  if (!w) return;
  
  var iconEl = document.getElementById('widgetIcon');
  var descEl = document.getElementById('widgetDesc');
  if (iconEl) iconEl.textContent = '⏳';
  if (descEl) descEl.textContent = '生成中…';
  
  aiGenerateWeather(w.id, function(success) {
    if (success) {
      renderWeatherWidget();
      popTip('天气已刷新', {icon:'✅', title:'完成'});
    } else {
      renderWeatherWidget();
      popTip('生成失败，请重试', {icon:'⚠️', title:'出错了'});
    }
  });
}


// ============================================================
// 天气小组件：AI 生成天气（适配异世界）
// ============================================================
async function aiGenerateWeather(worldId, callback) {
  var world = (DB.worlds || []).find(function(w) { return w.id === worldId; });
  if (!world) { if (callback) callback(false); return; }
  
  var model = DB.settings.auxModel || DB.settings.chatModel;
  if (!model) {
    popTip('请先在设置里选择模型', {icon:'⚙️', title:'提示'});
    if (callback) callback(false);
    return;
  }
  
  var now = new Date();
  var period = now.getHours() < 6 ? '凌晨' : now.getHours() < 12 ? '上午' : now.getHours() < 18 ? '下午' : '晚上';
  var month = now.getMonth() + 1;
  var season = month >= 3 && month <= 5 ? '春天' : month >= 6 && month <= 8 ? '夏天' : month >= 9 && month <= 11 ? '秋天' : '冬天';
  
  var prompt = '你是一个氛围感极强的小说环境描写师。请根据以下世界观，生成一条「天气氛围句」。\n\n' +
    '【世界观】\n' + (world.desc || '现代都市') + '\n\n' +
    '【当前时间】' + season + '，' + period + '\n\n' +
    '【要求】\n' +
    '1. 不要写「晴天」「下雨」「多云」这类干巴巴的词，要写出「这个世界独有的天气现象」\n' +
    '2. 如果世界观里有魔法、异能、妖气、灵气、赛博等设定，天气要体现这些元素\n' +
    '3. 字数严格控制在 18-30 字之间，像一句小说里的环境描写\n' +
    '4. 只输出一个 JSON 对象，格式：{"icon":"天气emoji","temp":数字,"desc":"氛围句","detail":"补充细节"}。不要任何解释，不要代码块标记。\n\n' +
    '可用 icon：☀️ 晴 / ⛅ 多云 / ☁️ 阴 / 🌧 雨 / ⛈ 雷暴 / ❄️ 雪 / 🌫 雾 / 🌪 风 / 🌙 夜\n' +
    'temp 范围：-5 ~ 45 之间合理数字\n' +
    'desc 就是那条氛围句\n' +
    'detail 可以写湿度、风、或世界观特有的细节（如「妖气浓度 73%」）';
  
  try {
    var out = await callAI([{ role: 'user', content: prompt }], model);
    out = out.replace(/```json/gi, '').replace(/```/g, '').trim();
    var match = out.match(/\{[\s\S]*\}/);
    if (match) out = match[0];
    var data = JSON.parse(out);
    
    if (!data.icon || data.temp === undefined || !data.desc) {
      throw new Error('AI 返回数据不完整');
    }
    
    world.weather = {
      icon: data.icon || '🌤',
      temp: data.temp !== undefined ? data.temp : 22,
      desc: data.desc || '天气宜人',
      detail: data.detail || '',
      updatedAt: Date.now()
    };
    save();
    
    // 如果当前在聊天且该角色关联了这个世界观，插入一条环境提示
    var activeWorldId = DB.desktop._activeWorld;
    if (activeWorldId === worldId) {
      var relatedChars = DB.contacts.filter(function(c) { return c.worldId === worldId && c.inChatList; });
      relatedChars.forEach(function(c) {
        if (DB.chats[c.id]) {
          var sysMsg = '🌤 天气变了：' + data.desc;
          var last = DB.chats[c.id][DB.chats[c.id].length - 1];
          if (!last || last.role !== 'system' || last.content !== sysMsg) {
            DB.chats[c.id].push({
              id: 'sys_' + Date.now(),
              role: 'system',
              type: 'system',
              content: sysMsg,
              time: Date.now()
            });
          }
        }
      });
      save();
    }
    
    if (callback) callback(true);
  } catch (e) {
    console.error('AI 生成天气失败:', e);
    if (callback) callback(false);
  }
}

      '<input id="we_detail" value="' + esc(weather.detail || '') + '" placeholder="如：湿度 89% · 妖气浓度 73%" style="width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;background:var(--bg);color:var(--text);box-sizing:border-box;">' +

function saveWeatherEditor() {
  var worldId = window._editingWorldId;
  var w = (DB.worlds || []).find(function(x) { return x.id === worldId; });
  if (!w) { closeModal(); return; }
  
  var icon = document.getElementById('we_icon').value.trim() || '🌤';

function listenHeart(c, passive) {
  if (!c) return;
  var cost = passive ? 8 : 10;
  var name = c.nick || c.name;

  if ((c.hearts || 0) < cost) {
    popTip('当前 ' + (c.hearts || 0) + '，需要 ' + cost + '。\n多和 ' + name + ' 聊天可以增加心动值哦～', {icon:'💔', title:'心动值不足'});
    return;
  }

  popLoading('正在倾听 ' + name + ' 的内心…');

  (async function() {
    try {
      var model = DB.settings.chatModel || DB.settings.auxModel;
      if (!model) {
        popTip('请先在设置里选择模型', {icon:'⚠️', title:'提示'});
        return;
      }

      var msgs = (DB.chats[c.id] || []).slice(-15);
      var convo = msgs.map(function(m) {
        var who = m.role === 'user' ? (DB.me.name || '我') : (c.nick || c.name);
        var content = m.content || '';
        if (m.type === 'image') content = '[图片]';
        if (m.type === 'sticker') content = '[表情]';
        if (m.type === 'transfer') content = '[转账]';
        if (m.type === 'voice') content = '[语音]';
        return who + '：' + content;
      }).join('\n');

      var system = buildSystem(c);
      var prompt = '【任务】根据上面的对话记录，生成一句 ' + (c.nick || c.name) + ' 此刻内心真实的想法（心声）。\n\n【硬性规则】\n1. 必须基于对话内容引发，不能凭空出现\n2. 字数严格控制在 20-30 字之间，最多一句话\n3. 不能是剧情总结（不能写成「你刚才说…」「今天你做了…」）\n4. 与表面人设形成反差（外表乖巧→内心带点小腹黑；外表高冷→内心其实在意）\n5. 不出现具体时间、地点、事件名称\n6. 用「他/她/这个人」代替对方名字\n\n【格式】只输出心声内容本身，不要引号、不要解释、不要任何标记。';

      var messages = [
        { role: 'system', content: system },
        { role: 'system', content: '以下是最近的对话记录：\n' + convo },
        { role: 'user', content: prompt }
      ];

      var out = await callAI(messages, model);
      out = out.trim().replace(/^["「”]+|["」”]+$/g, '').replace(/<state>[\s\S]*?<\/state>/g, '').trim();

      if (!out || out.length < 3) {
        out = '… 这个人，我好像越来越看不懂了。';
      }

      c.hearts = (c.hearts || 0) - cost;
      c.voiceLog = c.voiceLog || [];
      c.voiceLog.unshift({ t: Date.now(), content: out });
      c.heartLog = c.heartLog || [];
      c.heartLog.unshift({ t: Date.now(), n: -cost, reason: '💭 聆听了一次心声' });
      if (c.heartLog.length > 200) c.heartLog.pop();
      save();

      popTip('「' + out + '」\n\n— 消耗了 ' + cost + ' 心动值', {icon:'💭', title:name + ' 的心声'});

      if (view.type === 'hearts' || view.type === 'heartDetail' || view.type === 'voiceList') {
        render();
      }

    } catch (e) {
      popTip((e.message || '心声生成失败，请重试'), {icon:'⚠️', title:'出错了'});
    }
  })();
}

function attachSwipe() {
  var cells = document.querySelectorAll('.swipe-cell');
  cells.forEach(function(el) {
    if (el._swipeAttached) return;
    el._swipeAttached = true;

    var startX = 0, startY = 0, curX = 0, open = false, moved = false;
    var delWidth = 74;

    el.addEventListener('touchstart', function(e) {
      var t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      moved = false;
      el.style.transition = 'none';
    }, { passive: true });

    el.addEventListener('touchmove', function(e) {
      var t = e.touches[0];
      var dx = t.clientX - startX;
      var dy = t.clientY - startY;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 20) {
        return;
      }
      e.preventDefault();
      moved = true;
      var target = open ? dx - delWidth : dx;
      if (target > 0) target = 0;
      if (target < -delWidth) target = -delWidth;
      curX = target;
      el.style.transform = 'translateX(' + target + 'px)';
    }, { passive: false });

    el.addEventListener('touchend', function(e) {
      el.style.transition = 'transform .2s';
      var shouldOpen = curX < -delWidth * 0.4;
      if (shouldOpen) {
        el.style.transform = 'translateX(-' + delWidth + 'px)';
        open = true;
        curX = -delWidth;
      } else {
        el.style.transform = 'translateX(0)';
        open = false;
        curX = 0;
      }
    }, { passive: true });

    var pStartX = 0,
      pCurX = 0,
      pOpen = false,
      pMoved = false;
    el.addEventListener('pointerdown', function(e) {
      pStartX = e.clientX;
      pMoved = false;
      el.style.transition = 'none';
    });

    el.addEventListener('pointermove', function(e) {
      if (pStartX === undefined) return;
      var dx = e.clientX - pStartX;
      if (Math.abs(dx) < 5) return;
      pMoved = true;
      var target = pOpen ? dx - delWidth : dx;
      if (target > 0) target = 0;
      if (target < -delWidth) target = -delWidth;
      pCurX = target;
      el.style.transform = 'translateX(' + target + 'px)';
    });

    var pointerEnd = function() {
      if (!pMoved) return;
      el.style.transition = 'transform .2s';
      var shouldOpen = pCurX < -delWidth * 0.4;
      if (shouldOpen) {
        el.style.transform = 'translateX(-' + delWidth + 'px)';
        pOpen = true;
        pCurX = -delWidth;
      } else {
        el.style.transform = 'translateX(0)';
        pOpen = false;
        pCurX = 0;
      }
      pStartX = undefined;
    };
    el.addEventListener('pointerup', pointerEnd);
    el.addEventListener('pointercancel', pointerEnd);

    el.addEventListener('click', function(e) {
      if (moved || pMoved) {
        e.stopPropagation();
        e.preventDefault();
        if (open || pOpen) {
          el.style.transition = 'transform .2s';
          el.style.transform = 'translateX(0)';
          open = false;
          pOpen = false;
          curX = 0;
          pCurX = 0;
        }
      }
    }, true);
  });
}

// 折叠切换函数（放在全局，和 renderCharEdit 平级）
function toggleFold(header) {
  var body = header.nextElementSibling;
  var arrow = header.querySelector('.fold-arrow');
  if (!body || !body.classList.contains('fold-body')) return;
  var isOpen = body.classList.contains('open');
  if (isOpen) {
    body.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
  } else {
    body.classList.add('open');
    if (arrow) arrow.classList.add('open');
  }
}

async function settleMoments(){

  try{
    const targets=DB.moments.filter(m=>m.author==='me'&&!m._settled).map(m=>m.id);
    for(const pid of targets){
      const m=DB.moments.find(x=>x.id===pid);if(!m||m._settled)continue;
      if(!m._due){m._due=now+(20000+Math.random()*100000);dirty=true;continue;}
      if(Date.now()<m._due)continue;
      m._settled=true;dirty=true;
      const pool=DB.contacts.filter(c=>!c._draft&&c.activity!=='关');
      if(!pool.length){save();continue;}
      const n=Math.min(pool.length,1+Math.floor(Math.random()*2));
      const picked=pool.slice().sort(()=>Math.random()-0.5).slice(0,n);
      for(const c of picked){
        try{
          const r=await aiReactMoment(c,m);
          let ch=false;
          if(r&&r.like){m.likes=m.likes||[];if(!m.likes.includes(c.id)){m.likes.push(c.id);ch=true;}}

          if(ch){gained++;save();if(view.type==='moments')renderMoments();}
        }catch(e){}

  }finally{

    refreshMomentBadge();
  }

/* ===== AI 主动问候 ===== */
function _daySlot(){const h=new Date().getHours();if(h<6)return'深夜';if(h<12)return'早';if(h<18)return'中';return'晚';}
async function checkAutoGreet(){
  if(replying)return;
  if(!DB.settings.chatModel)return;
  const slot=_daySlot();if(slot==='深夜')return;
  const today=new Date().toDateString();
  for(const c of DB.contacts){
    // ===== 新增：检查时间衰减 =====
    checkTimeDecay(c);
	    // ===== 如果被角色拉黑，跳过主动问候 =====
    if (c.isBlockedByChar) continue;
    // =============================
    if(c._draft||!c.inChatList||c.activity==='关'||c.allowAutoGreet===false)continue;
    let should=false;
    if(c.activity==='高')should=true;
    else if(c.activity==='中')should=(slot==='早'||slot==='晚');
    else if(c.activity==='低')should=true;
    if(!should)continue;
    if(!c.greetLog||c.greetLog.date!==today)c.greetLog={date:today};
    if(c.activity==='低'){if(c.greetLog.dayDone)continue;}
    else{if(c.greetLog[slot])continue;}
    const msgs=DB.chats[c.id]||[];
    const lastT=msgs.length?(msgs[msgs.length-1].time||0):0;
    if(Date.now()-lastT<10*60000)continue;
    if(c.activity==='低')c.greetLog.dayDone=true;else c.greetLog[slot]=true;
    save();
    await doAutoGreet(c,slot);
    break;
  }
}
async function doAutoGreet(c,slot){
  // ===== 新增：严格检查拉黑状态（关键修复）=====
  if (c.isBlockedByChar) {
    // 如果角色拉黑了你，直接终止生成问候
    return;
  }
// ===== 原有逻辑继续 =====
const model = DB.settings.chatModel;
if (!model) return;
const periodTxt = { '早':'早上', '中':'下午', '晚':'晚上' }[slot] || '现在';
  const nudge=`（现在是${periodTxt}，你主动给对方发微信。要求：\n①必须用短句，像真人随手发微信，一次最多1~2句话，绝不长篇大论、不写小作文；\n②内容优先延续你们上次没聊完的话题，或随口分享你此刻在做的事/突然的念头/想问对方的一句话；\n③口语化、自然，符合你的人设与当前作息心情；\n④绝对禁止"早上好/晚上好/吃了吗/在吗"这类空洞客套模板。只输出要发的话本身。）`;
  try{
    const hist=(DB.chats[c.id]||[]).slice(-10).map(toApiMsg);
    const messages=[{role:'system',content:buildSystem(c)},{role:'system',content:'【立即生效·最高优先级】现在是微信线上打字聊天：只输出口语短句，句子要短，禁止括号里的动作/神态/心理描写，禁止旁白，禁止长段落。多句用换行分隔，且总共不超过2句。'},...hist,{role:'user',content:nudge}];
    let out=await callAI(messages,model);out=applyState(c,out);
    const lines=out.split(/\n+/).map(s=>s.trim()).filter(Boolean).slice(0,2);
    if(!lines.length)return;
    DB.chats[c.id]=DB.chats[c.id]||[];
    let cnt=0;
    lines.forEach(line=>{const m=Object.assign({id:newId(),role:'assistant',time:Date.now()},parseAiLine(line));DB.chats[c.id].push(m);cnt++;});
    c.inChatList=true;
    if(view.type==='chat'&&view.id===c.id){save();renderChat();}
    else{markChatUnread(c.id,cnt);save();}
  }catch(e){}
}

function addHeart(c,n,reason){if(!c)return;c.hearts=(c.hearts||0)+n;if(n>0)c.heartsTotal=(c.heartsTotal||0)+n;c.heartLog=c.heartLog||[];c.heartLog.unshift({t:Date.now(),n,reason});if(c.heartLog.length>200)c.heartLog.pop();checkMile(c);save();}
function checkMile(c){c.heartMile=c.heartMile||{};[[50,30],[100,50],[150,100]].forEach(([need,bonus])=>{if((c.heartsTotal||0)>=need&&!c.heartMile[need]){c.heartMile[need]=1;c.hearts+=bonus;c.heartLog.unshift({t:Date.now(),n:bonus,reason:`💗累计达成${need}奖励`});setTimeout(()=>popTip(`🎉 与${c.nick||c.name}的心动值累计突破 ${need}！奖励 ${bonus}`, {icon:'🎉', title:'突破奖励'}),400);}});}
function spendHeart(c,n,reason){
  if(!c) return false;
  if((c.hearts||0)<n){
    popTip('心动值不足～当前'+(c.hearts||0)+'，需要'+n+'。多和'+(c.nick||c.name)+'聊天可以获得哦');

  }
  c.hearts-=n;
  c.heartLog=c.heartLog||[];
  c.heartLog.unshift({t:Date.now(),n:-n,reason});
  save();
  return true;
}

    time: Date.now(),
    content: content,
    type: type || 'manual',     // 'manual' | 'auto'

  }, { icon: '🔒', title: '解除拉黑', ok: '立即解锁', cancel: '算了' });

function checkTimeDecay(c) {
  if (!c || !c.lastActive) return;
  
  // 【新增】自动解除角色拉黑逻辑
  if (c.isBlockedByChar && c.blockedByCharAt) {
    var now = Date.now();
    var blockDuration = now - c.blockedByCharAt;
    var autoUnblockTime = 0;

    // 小情绪：4-12小时随机，这里取最大值12小时(43200000ms)作为保底自动解除时间
    // 大矛盾：24小时(86400000ms)
    if (c.blockedType === '小情绪') {
      autoUnblockTime = 12 * 60 * 60 * 1000; 
    } else {
      autoUnblockTime = 24 * 60 * 60 * 1000;
    }

    if (blockDuration >= autoUnblockTime) {
      c.isBlockedByChar = false;
      c.blockedByCharAt = 0;
      c.blockedType = '';
      // 如果当前正在聊天界面，插入一条系统提示
      if (view.type === 'chat' && view.id === c.id) {
        insertSystemMessage('🔓 ' + (c.nick || c.name) + ' 气消了，解除了对你的拉黑。');
      }
      save();
    }
  }
  // 【新增结束】

  // 原有的衰减频率限制（每2小时检查一次数值衰减）
  if (c._lastDecayCheck && Date.now() - c._lastDecayCheck < 7200000) return;

  var hours = (Date.now() - c.lastActive) / (1000 * 60 * 60);
  var decay = 0, trustDecay = 0, tensionRise = 0;

  if (hours > 72) { decay = -8; trustDecay = -5; tensionRise = 5; }
  else if (hours > 48) { decay = -5; trustDecay = -3; tensionRise = 3; }
  else if (hours > 24) { decay = -3; trustDecay = -2; tensionRise = 2; }
  else if (hours > 12) { decay = -1; trustDecay = -0.5; tensionRise = 1; }
  else { return; }

  c.status.好感度 = clamp(c.status.好感度 + decay);
  c.status.信任度 = clamp(c.status.信任度 + trustDecay);
  c.status.紧张感 = clamp(c.status.紧张感 + tensionRise);

  c._lastDecayCheck = Date.now();
  save();

  if (view.type === 'chat' && view.id === c.id) {
    insertSystemMessage('💤 你冷落了 ' + (c.nick || c.name) + ' ' + Math.round(hours) + ' 小时，TA 似乎有些疏远了。');
  }
}

// 提示框（替换 alert）
function popTip(msg, opts){
  opts = opts || {};
  popClose();
  var p = document.createElement('div');
  p.className = 'popup';
  p.id = 'popup';
  p.innerHTML = '<div class="popup-box">' +
    (opts.icon ? '<div class="popup-icon">' + opts.icon + '</div>' : '') +
    (opts.title ? '<div class="popup-title">' + esc(opts.title) + '</div>' : '') +
    '<div class="popup-msg">' + esc(msg) + '</div>' +
    '<div class="popup-btns"><button class="popup-btn main" onclick="popClose()">' + (opts.ok || '知道啦') + '</button></div>' +
    '</div>';
  phone.appendChild(p);
}

// 确认框（替换 confirm）：onYes 是点确定后执行的函数

  opts = opts || {};

  window._popYes = onYes;

  p.className = 'popup';
  p.id = 'popup';

    (opts.icon ? '<div class="popup-icon">' + opts.icon + '</div>' : '') +

}

function applyState(c, text) {
  var m = text.match(/<state>([\s\S]*?)<\/state>/);
  if (m) {
    m[1].split(/[,，]/).forEach(function(p) {
      p = p.trim();
      var x;
      if (x = p.match(/好感\s*([+\-]?\d+)/)) {
        c.status.好感度 = clamp(c.status.好感度 + +x[1]);
      } else if (x = p.match(/信任\s*([+\-]?\d+)/)) {
        c.status.信任度 = clamp(c.status.信任度 + +x[1]);
      } else if (x = p.match(/紧张\s*([+\-]?\d+)/)) {
        c.status.紧张感 = clamp(c.status.紧张感 + +x[1]);
      } else if (x = p.match(/关系[:：]\s*(.+)/)) {
        c.status.当前关系 = x[1].trim();
      }
    });
    text = text.replace(m[0], '').trim();
  }

// ===== 解析心声标记（带频率限制） =====
// 【修复】如果是线下模式，直接返回，不处理心声
if (c.mode === 'offline') {
  if (c._pendingHeart) c._pendingHeart = 0;
  return text;
}

// 检查是否在封禁期内（用户连续叉掉3次后封禁24小时）
if (c._heartBlockUntil && Date.now() < c._heartBlockUntil) {
  // 封禁期内，忽略任何心声触发
  if (c._pendingHeart) c._pendingHeart = 0;
  return text;
}

var heartMatch = text.match(/心声[:：]\s*(\d+)/);
if (heartMatch) {
  var level = parseInt(heartMatch[1]) || 1;
  var now = Date.now();
  var cooldown = 30 * 60 * 1000; // 30分钟冷却

  // 检查同角色上次触发时间
  if (c._lastHeartTime && (now - c._lastHeartTime) < cooldown) {
    // 冷却中，忽略本次心声
    if (c._pendingHeart) c._pendingHeart = 0;
  } else {
    c._pendingHeart = level;
    c._heartGenerated = false;
    c._lastHeartTime = now;
    // 重置叉号计数（新的心声触发，说明之前的状态已过去）
    c._heartDismissCount = 0;
  }
} else {
  if (c._pendingHeart) {
    c._pendingHeart = 0;
  }
}
// =====================
  return text;
}
function parseAiLine(line){
  line = line.trim();
  var m;

  // 转账
  if (m = line.match(/^\[转账[|｜](.+?)(?:[|｜]([\s\S]*))?\]$/)) {
    return { type: 'transfer', from: 'ai', amount: m[1].trim(), content: (m[2] || '').trim() };
  }
  // 红包
  if (m = line.match(/^\[红包[|｜](.+?)(?:[|｜]([\s\S]*))?\]$/)) {
    return { type: 'transfer', amount: m[1].trim(), content: (m[2] || '').trim() };
  }
  // 语音
  if (m = line.match(/^\[语音[|｜]([\s\S]+)\]$/)) {
    return { type: 'voice', content: m[1].trim() };
  }
  // 表情
  if (m = line.match(/^\[表情[|｜](.+?)\]$/)) {
    return { type: 'sticker', content: m[1].trim() };
  }
  // 撤回
  if (m = line.match(/^\[撤回[|｜]([\s\S]+)\]$/)) {
    return { type: 'text', recalled: true, recalledContent: m[1].trim(), reveal: false };
  }
  // 拉黑玩家 —— 只返回类型，具体逻辑交给调用者处理
  if (m = line.match(/^\[拉黑玩家[|｜](.+?)\]$/)) {
    return { type: 'block_player', reason: m[1].trim() };
  }
  // 接收转账
  if (m = line.match(/^\[接收\]/)) {
    return { type: 'transfer_accept' };
  }
  // 退回转账
  if (m = line.match(/^\[退回\]/)) {
    return { type: 'transfer_refund' };
  }
  // 普通文本
  return { type: 'text', content: line };
}

  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (c.nick || c.name) + '_备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importCharacter(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = function(e){
    var file = inp.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.character || !data.chats) {
          popTip('不是有效的角色备份文件', {icon:'⚠️', title:'导入失败'});
          return;
        }
        var c = data.character;
        var existing = DB.contacts.find(function(x){ return x.name === c.name && x.nick === c.nick; });
        if (existing) {
          popConfirm('已存在同名角色「'+(c.nick||c.name)+'」，是否覆盖？', function(){
            var id = existing.id;
            for (var key in c) { existing[key] = c[key]; }
            DB.chats[id] = data.chats || [];
            save();
            popTip('已覆盖角色「'+(c.nick||c.name)+'」', {icon:'✅', title:'导入成功'});
            renderContacts();
          }, {icon:'📥', title:'覆盖确认'});
          return;
        }
        var newId = 'c' + Date.now();
        var newChar = blankChar(newId);
        for (var key2 in c) { newChar[key2] = c[key2]; }
        if (!newChar.status) newChar.status = {好感度:50, 信任度:50, 紧张感:0, 当前关系:'初次见面'};
        if (!newChar.chapters) newChar.chapters = [];
        newChar.inChatList = true;
        DB.contacts.push(newChar);
        DB.chats[newId] = data.chats || [];
        save();
        popTip('已导入角色「'+(c.nick||c.name)+'」', {icon:'✅', title:'导入成功'});
        renderContacts();
      } catch(err) {
        popTip(err.message, {icon:'⚠️', title:'文件解析失败'});
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}
</script>
</html>
